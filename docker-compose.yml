version: '3.8'

services:
  admin_web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./economy.db:/app/economy.db
      - ./admin_web:/app/admin_web
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
