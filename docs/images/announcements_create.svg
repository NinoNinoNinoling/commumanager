<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="900" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="900" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 유저 관리</text>

  <rect x="10" y="170" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="#a0aec0">💰 재화</text>

  <!-- 콘텐츠 (활성) -->
  <rect x="10" y="220" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="white" font-weight="600">📅 콘텐츠</text>

  <rect x="10" y="270" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="370" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="395" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <!-- 뒤로가기 버튼 -->
  <rect x="240" y="30" width="100" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="290" y="52" font-family="Arial" font-size="13" fill="#495057" text-anchor="middle">← 공지 목록</text>

  <text x="360" y="52" font-family="Arial" font-size="24" fill="#333" font-weight="bold">공지 예약 생성</text>
  <text x="360" y="77" font-family="Arial" font-size="13" fill="#6c757d">새로운 공지를 예약합니다</text>

  <!-- 메인 폼 카드 -->
  <rect x="240" y="110" width="620" height="740" rx="8" fill="white" filter="drop-shadow(0px 2px 6px rgba(0,0,0,0.1))"/>

  <!-- 폼 내용 -->
  <text x="270" y="150" font-family="Arial" font-size="16" fill="#333" font-weight="bold">기본 정보</text>
  <line x1="270" y1="160" x2="830" y2="160" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 공지 유형 -->
  <text x="270" y="195" font-family="Arial" font-size="13" fill="#495057" font-weight="600">공지 유형 <text fill="#dc3545">*</text></text>
  <rect x="270" y="203" width="250" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="230" font-family="Arial" font-size="14" fill="#495057">공지</text>
  <text x="495" y="230" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

  <!-- 공지 내용 -->
  <text x="270" y="280" font-family="Arial" font-size="13" fill="#495057" font-weight="600">공지 내용 <text fill="#dc3545">*</text></text>
  <text x="780" y="280" font-family="Arial" font-size="12" fill="#198754" font-weight="600">125 / 500자</text>
  <rect x="270" y="288" width="530" height="160" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="315" font-family="Arial" font-size="13" fill="#495057">내일 오전 10시부터 서버 점검이 있습니다.</text>
  <text x="285" y="335" font-family="Arial" font-size="13" fill="#495057">약 2시간 정도 소요될 예정이며,</text>
  <text x="285" y="355" font-family="Arial" font-size="13" fill="#495057">점검 중에는 일부 기능이 제한될 수 있습니다.</text>
  <text x="285" y="375" font-family="Arial" font-size="13" fill="#495057">양해 부탁드립니다.</text>

  <rect x="600" y="420" width="190" height="24" rx="4" fill="#d1e7dd"/>
  <text x="610" y="437" font-family="Arial" font-size="11" fill="#0f5132">✓ 500자 이내 (마스토돈 제한)</text>

  <!-- 예약 시간 -->
  <text x="270" y="490" font-family="Arial" font-size="16" fill="#333" font-weight="bold">예약 시간</text>
  <line x1="270" y1="500" x2="830" y2="500" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 날짜 -->
  <text x="270" y="535" font-family="Arial" font-size="13" fill="#495057" font-weight="600">예약 날짜 <text fill="#dc3545">*</text></text>
  <rect x="270" y="543" width="250" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="570" font-family="Arial" font-size="14" fill="#495057">2025-11-21</text>
  <text x="490" y="570" font-family="Arial" font-size="13" fill="#adb5bd">📅</text>

  <!-- 시간 -->
  <text x="550" y="535" font-family="Arial" font-size="13" fill="#495057" font-weight="600">예약 시간 <text fill="#dc3545">*</text></text>
  <rect x="550" y="543" width="250" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="565" y="570" font-family="Arial" font-size="14" fill="#495057">09:00</text>
  <text x="770" y="570" font-family="Arial" font-size="13" fill="#adb5bd">🕐</text>

  <!-- 옵션 -->
  <text x="270" y="630" font-family="Arial" font-size="16" fill="#333" font-weight="bold">옵션</text>
  <line x1="270" y1="640" x2="830" y2="640" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 공개 체크박스 -->
  <rect x="270" y="658" width="20" height="20" rx="3" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="275" y="675" font-family="Arial" font-size="16" fill="#198754">✓</text>
  <text x="300" y="675" font-family="Arial" font-size="14" fill="#495057">공개 (유저에게 보임)</text>

  <!-- 멘션 추가 체크박스 -->
  <rect x="270" y="693" width="20" height="20" rx="3" fill="#0d6efd" stroke="#0d6efd" stroke-width="1"/>
  <text x="275" y="710" font-family="Arial" font-size="16" fill="white">✓</text>
  <text x="300" y="710" font-family="Arial" font-size="14" fill="#495057">멘션 추가 (@everyone 태그)</text>

  <rect x="300" y="723" width="490" height="40" rx="4" fill="#fff3cd"/>
  <text x="310" y="743" font-family="Arial" font-size="11" fill="#856404">⚠️ 멘션 추가 시 모든 유저에게 알림이 전송됩니다.</text>
  <text x="310" y="756" font-family="Arial" font-size="11" fill="#856404">중요한 공지에만 사용하세요.</text>

  <!-- 미리보기 -->
  <text x="270" y="800" font-family="Arial" font-size="16" fill="#333" font-weight="bold">미리보기</text>
  <line x1="270" y1="810" x2="830" y2="810" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 버튼 영역 -->
  <line x1="240" y1="820" x2="860" y2="820" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="650" y="810" width="100" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="700" y="835" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">취소</text>

  <rect x="760" y="810" width="100" height="40" rx="4" fill="#198754"/>
  <text x="810" y="835" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">예약</text>

  <!-- 우측 도움말 영역 -->
  <!-- 안내 카드 -->
  <rect x="880" y="110" width="300" height="240" rx="8" fill="#e7f5ff" stroke="#0d6efd" stroke-width="1"/>
  <text x="900" y="140" font-family="Arial" font-size="13" fill="#084298" font-weight="600">💡 공지 작성 팁</text>

  <text x="900" y="165" font-family="Arial" font-size="11" fill="#084298">• 공지 유형:</text>
  <text x="910" y="182" font-family="Arial" font-size="11" fill="#084298">- 공지: 중요한 알림 (빨강)</text>
  <text x="910" y="199" font-family="Arial" font-size="11" fill="#084298">- 안내: 일반 정보 (파랑)</text>
  <text x="910" y="216" font-family="Arial" font-size="11" fill="#084298">- 경고: 주의사항 (보라)</text>

  <text x="900" y="237" font-family="Arial" font-size="11" fill="#084298">• 내용은 간결하고 명확하게 작성</text>
  <text x="900" y="254" font-family="Arial" font-size="11" fill="#084298">• 마스토돈 500자 제한 준수</text>
  <text x="900" y="271" font-family="Arial" font-size="11" fill="#084298">• 예약 시간은 최소 5분 이후</text>
  <text x="900" y="288" font-family="Arial" font-size="11" fill="#084298">• @everyone 멘션은 신중하게</text>
  <text x="900" y="305" font-family="Arial" font-size="11" fill="#084298">• 발송 후 수정 불가 (신중히 확인)</text>

  <text x="900" y="330" font-family="Arial" font-size="11" fill="#084298" font-weight="600">※ 예약 후에도 발송 전까지는</text>
  <text x="900" y="345" font-family="Arial" font-size="11" fill="#084298">   수정 및 취소가 가능합니다</text>

  <!-- 미리보기 카드 -->
  <rect x="880" y="370" width="300" height="200" rx="8" fill="white" filter="drop-shadow(0px 2px 6px rgba(0,0,0,0.1))"/>
  <text x="900" y="400" font-family="Arial" font-size="14" fill="#6c757d" font-weight="600">미리보기</text>
  <line x1="900" y1="410" x2="1160" y2="410" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 미리보기 포스트 -->
  <rect x="900" y="425" width="260" height="130" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <text x="920" y="450" font-family="Arial" font-size="12" fill="#333" font-weight="bold">🏰 호그와트 (@hogwarts)</text>
  <rect x="920" y="458" width="50" height="18" rx="4" fill="#dc3545"/>
  <text x="945" y="472" font-family="Arial" font-size="10" fill="white" text-anchor="middle">공지</text>

  <text x="920" y="495" font-family="Arial" font-size="11" fill="#333">@everyone 내일 오전 10시부터</text>
  <text x="920" y="510" font-family="Arial" font-size="11" fill="#333">서버 점검이 있습니다. 약 2시간</text>
  <text x="920" y="525" font-family="Arial" font-size="11" fill="#333">정도 소요될 예정이며...</text>

  <text x="920" y="545" font-family="Arial" font-size="10" fill="#6c757d">2025-11-21 09:00 예약됨</text>

  <!-- 주의사항 카드 -->
  <rect x="880" y="590" width="300" height="140" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="900" y="620" font-family="Arial" font-size="13" fill="#856404" font-weight="600">⚠️ 주의사항</text>

  <text x="900" y="645" font-family="Arial" font-size="11" fill="#856404">• 예약된 공지는 지정 시간에 자동</text>
  <text x="900" y="662" font-family="Arial" font-size="11" fill="#856404">  발송됩니다</text>

  <text x="900" y="682" font-family="Arial" font-size="11" fill="#856404">• 발송 후에는 수정/삭제 불가</text>

  <text x="900" y="702" font-family="Arial" font-size="11" fill="#856404">• 중복 발송 방지를 위해 내용을</text>
  <text x="900" y="719" font-family="Arial" font-size="11" fill="#856404">  신중하게 확인하세요</text>

  <!-- API 안내 카드 -->
  <rect x="880" y="750" width="300" height="100" rx="8" fill="#d1ecf1" stroke="#0dcaf0" stroke-width="1"/>
  <text x="900" y="780" font-family="Arial" font-size="13" fill="#055160" font-weight="600">📝 API 사용</text>

  <text x="900" y="805" font-family="Arial" font-size="11" fill="#055160">고급 기능(반복 예약, 조건부 발송)</text>
  <text x="900" y="822" font-family="Arial" font-size="11" fill="#055160">은 API를 통해 사용 가능합니다.</text>

  <text x="900" y="842" font-family="Arial" font-size="11" fill="#0dcaf0" text-decoration="underline">→ API 문서 보기</text>
</svg>
