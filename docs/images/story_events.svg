<svg width="1200" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="1000" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="1000" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 사용자</text>

  <rect x="10" y="170" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="#a0aec0">⚠️ 활동량</text>

  <!-- 콘텐츠 그룹 (활성) -->
  <rect x="10" y="220" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="white" font-weight="600">📅 콘텐츠 ▼</text>

  <!-- 콘텐츠 서브메뉴 -->
  <rect x="20" y="265" width="170" height="30" rx="4" fill="transparent"/>
  <text x="40" y="285" font-family="Arial" font-size="12" fill="#cbd5e0">• 일정 관리</text>

  <rect x="20" y="295" width="170" height="30" rx="4" fill="#3182ce"/>
  <text x="40" y="315" font-family="Arial" font-size="12" fill="white" font-weight="600">• 스토리 이벤트</text>

  <rect x="20" y="325" width="170" height="30" rx="4" fill="transparent"/>
  <text x="40" y="345" font-family="Arial" font-size="12" fill="#cbd5e0">• 공지 예약</text>

  <rect x="10" y="370" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="395" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <rect x="10" y="420" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="445" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="470" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="495" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <text x="240" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">📹 스토리 이벤트 관리</text>
  <text x="240" y="75" font-family="Arial" font-size="13" fill="#6c757d">스토리 이벤트와 포스트를 관리합니다 (이벤트 단위로 여러 포스트를 일정 간격으로 발송)</text>

  <!-- 통계 카드들 -->
  <rect x="240" y="100" width="210" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="130" font-family="Arial" font-size="13" fill="#6c757d">대기 중</text>
  <text x="260" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">5</text>
  <text x="385" y="175" font-family="Arial" font-size="36" fill="#ffc107">⏳</text>

  <rect x="470" y="100" width="210" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="490" y="130" font-family="Arial" font-size="13" fill="#6c757d">진행 중</text>
  <text x="490" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">2</text>
  <text x="615" y="175" font-family="Arial" font-size="36" fill="#0dcaf0">▶️</text>

  <rect x="700" y="100" width="210" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="720" y="130" font-family="Arial" font-size="13" fill="#6c757d">완료</text>
  <text x="720" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">12</text>
  <text x="845" y="175" font-family="Arial" font-size="36" fill="#198754">✅</text>

  <rect x="930" y="100" width="210" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="950" y="130" font-family="Arial" font-size="13" fill="#6c757d">실패</text>
  <text x="950" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">1</text>
  <text x="1075" y="175" font-family="Arial" font-size="36" fill="#dc3545">❌</text>

  <!-- 이벤트 목록 카드 -->
  <rect x="240" y="230" width="900" height="440" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>

  <!-- 카드 헤더 -->
  <text x="270" y="265" font-family="Arial" font-size="16" fill="#333" font-weight="bold">스토리 이벤트 목록</text>
  <rect x="890" y="245" width="110" height="32" rx="6" fill="#198754"/>
  <text x="895" y="267" font-family="Arial" font-size="13" fill="white" font-weight="600">+ 이벤트 생성</text>

  <rect x="1020" y="245" width="100" height="32" rx="6" fill="#0dcaf0"/>
  <text x="1027" y="267" font-family="Arial" font-size="12" fill="white" font-weight="600">📝 API 문서</text>

  <!-- 안내 메시지 -->
  <rect x="270" y="285" width="850" height="65" rx="6" fill="#cfe2ff"/>
  <text x="290" y="310" font-family="Arial" font-size="13" fill="#052c65" font-weight="bold">ℹ️ API를 통해 관리:</text>
  <text x="310" y="330" font-family="Arial" font-size="12" fill="#052c65">현재 UI는 간략하게 구현되어 있습니다. 자세한 기능은 /api/v1/story-events API를 사용하세요.</text>

  <!-- 테이블 헤더 -->
  <rect x="270" y="365" width="850" height="40" rx="0" fill="#f8f9fa"/>
  <text x="285" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">ID</text>
  <text x="345" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">제목</text>
  <text x="555" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">시작 시간</text>
  <text x="715" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">간격(분)</text>
  <text x="825" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">포스트 수</text>
  <text x="940" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">상태</text>
  <text x="1030" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">생성일</text>

  <!-- 테이블 행 1 -->
  <line x1="270" y1="405" x2="1120" y2="405" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="430" font-family="Arial" font-size="12" fill="#333">1</text>
  <text x="345" y="430" font-family="Arial" font-size="12" fill="#333">새해 인사 시리즈</text>
  <text x="555" y="430" font-family="Arial" font-size="12" fill="#333">2025-01-01 00:00</text>
  <text x="735" y="430" font-family="Arial" font-size="12" fill="#333">10</text>
  <text x="855" y="430" font-family="Arial" font-size="12" fill="#333">3</text>
  <rect x="935" y="415" width="65" height="22" rx="11" fill="#198754"/>
  <text x="945" y="430" font-family="Arial" font-size="11" fill="white">완료</text>
  <text x="1030" y="430" font-family="Arial" font-size="12" fill="#6c757d">2024-12-20</text>

  <!-- 테이블 행 2 -->
  <line x1="270" y1="445" x2="1120" y2="445" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="470" font-family="Arial" font-size="12" fill="#333">2</text>
  <text x="345" y="470" font-family="Arial" font-size="12" fill="#333">생일 축하 메시지</text>
  <text x="555" y="470" font-family="Arial" font-size="12" fill="#333">2025-01-15 09:00</text>
  <text x="735" y="470" font-family="Arial" font-size="12" fill="#333">5</text>
  <text x="855" y="470" font-family="Arial" font-size="12" fill="#333">4</text>
  <rect x="935" y="455" width="65" height="22" rx="11" fill="#0dcaf0"/>
  <text x="938" y="470" font-family="Arial" font-size="11" fill="white">진행 중</text>
  <text x="1030" y="470" font-family="Arial" font-size="12" fill="#6c757d">2025-01-10</text>

  <!-- 테이블 행 3 -->
  <line x1="270" y1="485" x2="1120" y2="485" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="510" font-family="Arial" font-size="12" fill="#333">3</text>
  <text x="345" y="510" font-family="Arial" font-size="12" fill="#333">이벤트 카운트다운</text>
  <text x="555" y="510" font-family="Arial" font-size="12" fill="#333">2025-02-01 00:00</text>
  <text x="735" y="510" font-family="Arial" font-size="12" fill="#333">60</text>
  <text x="855" y="510" font-family="Arial" font-size="12" fill="#333">24</text>
  <rect x="935" y="495" width="65" height="22" rx="11" fill="#ffc107"/>
  <text x="943" y="510" font-family="Arial" font-size="11" fill="#000">대기 중</text>
  <text x="1030" y="510" font-family="Arial" font-size="12" fill="#6c757d">2025-01-18</text>

  <!-- 테이블 행 4 -->
  <line x1="270" y1="525" x2="1120" y2="525" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="550" font-family="Arial" font-size="12" fill="#333">4</text>
  <text x="345" y="550" font-family="Arial" font-size="12" fill="#333">마법 축제 안내</text>
  <text x="555" y="550" font-family="Arial" font-size="12" fill="#333">2025-03-01 12:00</text>
  <text x="735" y="550" font-family="Arial" font-size="12" fill="#333">15</text>
  <text x="855" y="550" font-family="Arial" font-size="12" fill="#333">6</text>
  <rect x="935" y="535" width="65" height="22" rx="11" fill="#ffc107"/>
  <text x="943" y="550" font-family="Arial" font-size="11" fill="#000">대기 중</text>
  <text x="1030" y="550" font-family="Arial" font-size="12" fill="#6c757d">2025-01-19</text>

  <!-- 테이블 행 5 -->
  <line x1="270" y1="565" x2="1120" y2="565" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="590" font-family="Arial" font-size="12" fill="#333">5</text>
  <text x="345" y="590" font-family="Arial" font-size="12" fill="#333">주간 활동 요약</text>
  <text x="555" y="590" font-family="Arial" font-size="12" fill="#333">2025-01-20 18:00</text>
  <text x="735" y="590" font-family="Arial" font-size="12" fill="#333">30</text>
  <text x="855" y="590" font-family="Arial" font-size="12" fill="#333">7</text>
  <rect x="935" y="575" width="65" height="22" rx="11" fill="#ffc107"/>
  <text x="943" y="590" font-family="Arial" font-size="11" fill="#000">대기 중</text>
  <text x="1030" y="590" font-family="Arial" font-size="12" fill="#6c757d">2025-01-20</text>

  <!-- 테이블 하단 경계 -->
  <line x1="270" y1="605" x2="1120" y2="605" stroke="#dee2e6" stroke-width="1"/>

  <!-- Empty state message (만약 이벤트가 없을 때) -->
  <!-- <text x="655" y="500" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle">이벤트가 없습니다</text> -->

  <!-- 모달 배경 (반투명) -->
  <rect x="0" y="0" width="1200" height="1000" fill="black" opacity="0.5"/>

  <!-- 이벤트 생성 모달창 -->
  <rect x="300" y="100" width="600" height="800" rx="8" fill="white" filter="drop-shadow(0px 4px 12px rgba(0,0,0,0.3))"/>

  <!-- 모달 헤더 -->
  <rect x="300" y="100" width="600" height="50" rx="8" fill="#f8f9fa"/>
  <text x="320" y="132" font-family="Arial" font-size="18" fill="#333" font-weight="bold">스토리 이벤트 생성</text>
  <text x="870" y="130" font-family="Arial" font-size="24" fill="#6c757d" cursor="pointer">×</text>

  <!-- 모달 내용 -->
  <text x="320" y="180" font-family="Arial" font-size="13" fill="#495057" font-weight="600">이벤트 제목 <text fill="#dc3545">*</text></text>
  <rect x="320" y="188" width="540" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="330" y="213" font-family="Arial" font-size="13" fill="#adb5bd">예: 새해 맞이 특별 이벤트</text>

  <text x="320" y="260" font-family="Arial" font-size="13" fill="#495057" font-weight="600">설명</text>
  <rect x="320" y="268" width="540" height="80" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="330" y="293" font-family="Arial" font-size="13" fill="#adb5bd">이벤트에 대한 간단한 설명 (선택사항)</text>

  <text x="320" y="380" font-family="Arial" font-size="13" fill="#495057" font-weight="600">시작 시간 <text fill="#dc3545">*</text></text>
  <rect x="320" y="388" width="260" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="330" y="413" font-family="Arial" font-size="13" fill="#495057">2025-01-01</text>
  <text x="460" y="413" font-family="Arial" font-size="13" fill="#adb5bd">📅</text>
  <rect x="500" y="388" width="150" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="510" y="413" font-family="Arial" font-size="13" fill="#495057">00:00</text>
  <text x="630" y="413" font-family="Arial" font-size="13" fill="#adb5bd">🕐</text>

  <text x="320" y="460" font-family="Arial" font-size="13" fill="#495057" font-weight="600">포스트 간격 (분) <text fill="#dc3545">*</text></text>
  <rect x="320" y="468" width="150" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="330" y="493" font-family="Arial" font-size="13" fill="#495057">5</text>

  <text x="500" y="485" font-family="Arial" font-size="11" fill="#6c757d">각 포스트가 발송되는 시간 간격</text>

  <text x="320" y="540" font-family="Arial" font-size="13" fill="#495057" font-weight="600">포스트 추가 방법</text>

  <!-- 옵션 1: 직접 추가 -->
  <rect x="320" y="555" width="260" height="100" rx="6" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <text x="340" y="580" font-family="Arial" font-size="14" fill="#0d6efd" font-weight="600">📝 나중에 직접 추가</text>
  <text x="340" y="605" font-family="Arial" font-size="12" fill="#6c757d">이벤트 생성 후 상세 페이지에서</text>
  <text x="340" y="625" font-family="Arial" font-size="12" fill="#6c757d">포스트를 하나씩 추가합니다</text>

  <!-- 옵션 2: 엑셀 업로드 -->
  <rect x="600" y="555" width="260" height="100" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="620" y="580" font-family="Arial" font-size="14" fill="#495057" font-weight="600">📊 엑셀 파일로 업로드</text>
  <text x="620" y="605" font-family="Arial" font-size="12" fill="#6c757d">포스트 내용을 엑셀 파일로</text>
  <text x="620" y="625" font-family="Arial" font-size="12" fill="#6c757d">한 번에 업로드합니다</text>

  <!-- 안내 메시지 -->
  <rect x="320" y="680" width="540" height="110" rx="6" fill="#fff3cd"/>
  <text x="340" y="705" font-family="Arial" font-size="13" fill="#856404" font-weight="600">💡 이벤트 생성 후:</text>
  <text x="340" y="730" font-family="Arial" font-size="12" fill="#856404">• 이벤트를 클릭하면 종속된 포스트들을 관리할 수 있습니다</text>
  <text x="340" y="750" font-family="Arial" font-size="12" fill="#856404">• 각 포스트는 시작 시간부터 지정한 간격으로 자동 발송됩니다</text>
  <text x="340" y="770" font-family="Arial" font-size="12" fill="#856404">• 마스토돈 제한: 500자 이내, 이미지 최대 4개, ALT 텍스트 권장</text>

  <!-- 모달 푸터 -->
  <line x1="300" y1="820" x2="900" y2="820" stroke="#dee2e6" stroke-width="1"/>

  <rect x="680" y="840" width="90" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="725" y="865" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">취소</text>

  <rect x="780" y="840" width="100" height="40" rx="4" fill="#198754"/>
  <text x="830" y="865" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">생성</text>
</svg>
