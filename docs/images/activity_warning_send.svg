<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 (흐릿하게) -->
  <rect width="1200" height="900" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 (흐릿하게) -->
  <g opacity="0.3">
    <rect width="200" height="900" fill="#2d3748"/>
    <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  </g>

  <!-- 메인 콘텐츠 배경 (흐릿하게) -->
  <g opacity="0.3">
    <text x="340" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">유저 관리</text>
    <text x="340" y="75" font-family="Arial" font-size="13" fill="#6c757d">활동량 모니터링, 휴식 현황, 재화 관리</text>
  </g>

  <!-- 모달 오버레이 -->
  <rect x="0" y="0" width="1200" height="900" fill="#000000" opacity="0.5"/>

  <!-- 모달 창 -->
  <rect x="300" y="80" width="600" height="740" rx="12" fill="white" filter="drop-shadow(0px 8px 24px rgba(0,0,0,0.3))"/>

  <!-- 모달 헤더 -->
  <rect x="300" y="80" width="600" height="60" rx="12" fill="#dc3545"/>
  <text x="330" y="118" font-family="Arial" font-size="20" fill="white" font-weight="bold">⚠️ 활동량 경고 발송</text>

  <!-- 닫기 버튼 -->
  <circle cx="870" cy="110" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="865" y="117" font-family="Arial" font-size="20" fill="white" font-weight="bold">×</text>

  <!-- 모달 본문 -->
  <!-- 대상 유저 정보 -->
  <rect x="330" y="160" width="540" height="60" rx="6" fill="#f8f9fa"/>
  <text x="350" y="185" font-family="Arial" font-size="14" fill="#495057" font-weight="600">대상 유저</text>
  <text x="350" y="210" font-family="Arial" font-size="16" fill="#0d6efd" font-weight="bold">@user123 (김민준)</text>
  <text x="680" y="210" font-family="Arial" font-size="13" fill="#dc3545">⚠️ 현재 2차 경고 상태</text>

  <!-- 경고 수준 선택 -->
  <text x="330" y="255" font-family="Arial" font-size="14" fill="#495057" font-weight="600">경고 수준 <text fill="#dc3545">*</text></text>

  <!-- 1차 경고 옵션 -->
  <rect x="330" y="270" width="160" height="70" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <circle cx="345" cy="290" r="8" fill="white" stroke="#ffc107" stroke-width="2"/>
  <text x="365" y="295" font-family="Arial" font-size="14" fill="#495057">⚠️ 1차 경고</text>
  <text x="365" y="315" font-family="Arial" font-size="11" fill="#6c757d">부드러운 주의</text>

  <!-- 2차 경고 옵션 -->
  <rect x="505" y="270" width="160" height="70" rx="6" fill="white" stroke="#fd7e14" stroke-width="3"/>
  <circle cx="520" cy="290" r="8" fill="white" stroke="#fd7e14" stroke-width="2"/>
  <circle cx="520" cy="290" r="5" fill="#fd7e14"/>
  <text x="540" y="295" font-family="Arial" font-size="14" fill="#fd7e14" font-weight="600">⚠️ 2차 경고</text>
  <text x="540" y="315" font-family="Arial" font-size="11" fill="#6c757d">중간 수준 경고</text>

  <!-- 3차 경고 옵션 -->
  <rect x="680" y="270" width="190" height="70" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <circle cx="695" cy="290" r="8" fill="white" stroke="#dc3545" stroke-width="2"/>
  <text x="715" y="295" font-family="Arial" font-size="14" fill="#495057">🚨 3차 경고 (최종)</text>
  <text x="715" y="315" font-family="Arial" font-size="11" fill="#6c757d">강력한 경고</text>

  <!-- 경고 메시지 템플릿 선택 -->
  <text x="330" y="375" font-family="Arial" font-size="14" fill="#495057" font-weight="600">메시지 템플릿</text>
  <rect x="330" y="385" width="540" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="410" font-family="Arial" font-size="13" fill="#495057">[2차 경고] 활동 부족 안내</text>
  <text x="840" y="410" font-family="Arial" font-size="14" fill="#6c757d">▼</text>

  <!-- 경고 메시지 내용 -->
  <text x="330" y="460" font-family="Arial" font-size="14" fill="#495057" font-weight="600">경고 메시지 <text fill="#dc3545">*</text></text>
  <rect x="330" y="470" width="540" height="120" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="495" font-family="Arial" font-size="12" fill="#495057">안녕하세요, @user123님.</text>
  <text x="350" y="515" font-family="Arial" font-size="12" fill="#495057">최근 7일간 활동량이 기준에 미치지 못하여 2차 경고를 드립니다.</text>
  <text x="350" y="535" font-family="Arial" font-size="12" fill="#495057">현재 활동: 답글 3개 (기준: 5개/주)</text>
  <text x="350" y="565" font-family="Arial" font-size="12" fill="#495057">다음 주까지 활동을 개선해주시길 부탁드립니다.</text>

  <!-- 추가 메모 (선택사항) -->
  <text x="330" y="625" font-family="Arial" font-size="14" fill="#495057" font-weight="600">추가 메모 (선택사항)</text>
  <rect x="330" y="635" width="540" height="60" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="660" font-family="Arial" font-size="12" fill="#adb5bd">관리자 메모나 특이사항을 입력하세요 (유저에게 표시되지 않음)</text>

  <!-- 경고 발송 옵션 -->
  <rect x="330" y="715" width="540" height="30" rx="6" fill="transparent"/>
  <rect x="330" y="717" width="18" height="18" rx="3" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <rect x="332" y="719" width="14" height="14" rx="2" fill="#0d6efd"/>
  <text x="358" y="732" font-family="Arial" font-size="13" fill="#495057">DM으로 발송 (체크 해제 시 공개 멘션)</text>

  <!-- 안내 메시지 -->
  <rect x="330" y="760" width="540" height="50" rx="6" fill="#fff3cd"/>
  <text x="350" y="785" font-family="Arial" font-size="13" fill="#856404" font-weight="600">⚠️ 주의사항</text>
  <text x="350" y="802" font-family="Arial" font-size="11" fill="#856404">경고 발송 시 warnings 테이블에 자동 기록되며, 휴가 중인 유저는 제외됩니다.</text>

  <!-- 푸터 버튼 -->
  <line x1="300" y1="750" x2="900" y2="750" stroke="#dee2e6" stroke-width="1"/>

  <rect x="330" y="770" width="240" height="40" rx="6" fill="white" stroke="#6c757d" stroke-width="2"/>
  <text x="450" y="795" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle" font-weight="600">취소</text>

  <rect x="590" y="770" width="280" height="40" rx="6" fill="#dc3545"/>
  <text x="730" y="795" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">⚠️ 경고 발송</text>
</svg>
