<svg width="1200" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="1000" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="1000" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 사용자</text>

  <rect x="10" y="170" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="#a0aec0">⚠️ 활동량</text>

  <!-- 콘텐츠 그룹 (활성) -->
  <rect x="10" y="220" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="white" font-weight="600">📅 콘텐츠 ▼</text>

  <!-- 콘텐츠 서브메뉴 -->
  <rect x="20" y="265" width="170" height="30" rx="4" fill="transparent"/>
  <text x="40" y="285" font-family="Arial" font-size="12" fill="#cbd5e0">• 일정 관리</text>

  <rect x="20" y="295" width="170" height="30" rx="4" fill="transparent"/>
  <text x="40" y="315" font-family="Arial" font-size="12" fill="#cbd5e0">• 스토리 이벤트</text>

  <rect x="20" y="325" width="170" height="30" rx="4" fill="#3182ce"/>
  <text x="40" y="345" font-family="Arial" font-size="12" fill="white" font-weight="600">• 공지 예약</text>

  <rect x="10" y="370" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="395" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <rect x="10" y="420" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="445" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="470" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="495" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <text x="240" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">📢 공지 예약 관리</text>
  <text x="240" y="75" font-family="Arial" font-size="13" fill="#6c757d">공지를 예약하고 관리합니다</text>

  <!-- 통계 카드들 -->
  <rect x="240" y="100" width="430" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="130" font-family="Arial" font-size="13" fill="#6c757d">대기 중</text>
  <text x="260" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">8</text>
  <text x="600" y="175" font-family="Arial" font-size="36" fill="#ffc107">⏳</text>

  <rect x="710" y="100" width="430" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="730" y="130" font-family="Arial" font-size="13" fill="#6c757d">발행됨</text>
  <text x="730" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">24</text>
  <text x="1070" y="175" font-family="Arial" font-size="36" fill="#198754">✅</text>

  <!-- 공지 목록 카드 -->
  <rect x="240" y="230" width="900" height="440" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>

  <!-- 카드 헤더 -->
  <text x="270" y="265" font-family="Arial" font-size="16" fill="#333" font-weight="bold">공지 예약 목록</text>
  <rect x="900" y="245" width="100" height="32" rx="6" fill="#198754"/>
  <text x="910" y="267" font-family="Arial" font-size="13" fill="white" font-weight="600">+ 공지 생성</text>

  <rect x="1020" y="245" width="100" height="32" rx="6" fill="#0dcaf0"/>
  <text x="1027" y="267" font-family="Arial" font-size="12" fill="white" font-weight="600">📝 API 문서</text>

  <!-- 안내 메시지 -->
  <rect x="270" y="285" width="850" height="65" rx="6" fill="#cfe2ff"/>
  <text x="290" y="310" font-family="Arial" font-size="13" fill="#052c65" font-weight="bold">ℹ️ API를 통해 관리:</text>
  <text x="310" y="330" font-family="Arial" font-size="12" fill="#052c65">현재 UI는 간략하게 구현되어 있습니다. 자세한 기능은 /api/v1/announcements API를 사용하세요.</text>

  <!-- 테이블 헤더 -->
  <rect x="270" y="365" width="850" height="40" rx="0" fill="#f8f9fa"/>
  <text x="285" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">ID</text>
  <text x="345" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">유형</text>
  <text x="475" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">내용</text>
  <text x="815" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">예약 시간</text>
  <text x="965" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">상태</text>
  <text x="1050" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="bold">생성일</text>

  <!-- 테이블 행 1 -->
  <line x1="270" y1="405" x2="1120" y2="405" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="430" font-family="Arial" font-size="12" fill="#333">1</text>
  <text x="345" y="430" font-family="Arial" font-size="12" fill="#333">공지</text>
  <text x="475" y="430" font-family="Arial" font-size="12" fill="#333">내일 오전 10시부터 서버 점검이 있습니다.</text>
  <text x="815" y="430" font-family="Arial" font-size="12" fill="#333">2025-01-21 09:00</text>
  <rect x="960" y="415" width="65" height="22" rx="11" fill="#ffc107"/>
  <text x="968" y="430" font-family="Arial" font-size="11" fill="#000">대기 중</text>
  <text x="1050" y="430" font-family="Arial" font-size="12" fill="#6c757d">2025-01-20</text>

  <!-- 테이블 행 2 -->
  <line x1="270" y1="445" x2="1120" y2="445" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="470" font-family="Arial" font-size="12" fill="#333">2</text>
  <text x="345" y="470" font-family="Arial" font-size="12" fill="#333">안내</text>
  <text x="475" y="470" font-family="Arial" font-size="12" fill="#333">새해 이벤트가 시작됩니다! 많은 참여 부탁드립니다.</text>
  <text x="815" y="470" font-family="Arial" font-size="12" fill="#333">2025-01-01 00:00</text>
  <rect x="960" y="455" width="65" height="22" rx="11" fill="#198754"/>
  <text x="973" y="470" font-family="Arial" font-size="11" fill="white">발행됨</text>
  <text x="1050" y="470" font-family="Arial" font-size="12" fill="#6c757d">2024-12-25</text>

  <!-- 테이블 행 3 -->
  <line x1="270" y1="485" x2="1120" y2="485" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="510" font-family="Arial" font-size="12" fill="#333">3</text>
  <text x="345" y="510" font-family="Arial" font-size="12" fill="#333">공지</text>
  <text x="475" y="510" font-family="Arial" font-size="12" fill="#333">2월 커뮤니티 미팅 일정을 공지합니다.</text>
  <text x="815" y="510" font-family="Arial" font-size="12" fill="#333">2025-01-25 10:00</text>
  <rect x="960" y="495" width="65" height="22" rx="11" fill="#ffc107"/>
  <text x="968" y="510" font-family="Arial" font-size="11" fill="#000">대기 중</text>
  <text x="1050" y="510" font-family="Arial" font-size="12" fill="#6c757d">2025-01-20</text>

  <!-- 테이블 행 4 -->
  <line x1="270" y1="525" x2="1120" y2="525" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="550" font-family="Arial" font-size="12" fill="#333">4</text>
  <text x="345" y="550" font-family="Arial" font-size="12" fill="#333">안내</text>
  <text x="475" y="550" font-family="Arial" font-size="12" fill="#333">휴식기간 시스템 업데이트 안내</text>
  <text x="815" y="550" font-family="Arial" font-size="12" fill="#333">2025-01-15 14:00</text>
  <rect x="960" y="535" width="65" height="22" rx="11" fill="#198754"/>
  <text x="973" y="550" font-family="Arial" font-size="11" fill="white">발행됨</text>
  <text x="1050" y="550" font-family="Arial" font-size="12" fill="#6c757d">2025-01-14</text>

  <!-- 테이블 행 5 -->
  <line x1="270" y1="565" x2="1120" y2="565" stroke="#dee2e6" stroke-width="1"/>
  <text x="285" y="590" font-family="Arial" font-size="12" fill="#333">5</text>
  <text x="345" y="590" font-family="Arial" font-size="12" fill="#333">공지</text>
  <text x="475" y="590" font-family="Arial" font-size="12" fill="#333">상점에 새로운 아이템이 추가되었습니다!</text>
  <text x="815" y="590" font-family="Arial" font-size="12" fill="#333">2025-01-12 16:00</text>
  <rect x="960" y="575" width="65" height="22" rx="11" fill="#198754"/>
  <text x="973" y="590" font-family="Arial" font-size="11" fill="white">발행됨</text>
  <text x="1050" y="590" font-family="Arial" font-size="12" fill="#6c757d">2025-01-11</text>

  <!-- 테이블 하단 경계 -->
  <line x1="270" y1="605" x2="1120" y2="605" stroke="#dee2e6" stroke-width="1"/>

  <!-- Empty state message (만약 공지가 없을 때) -->
  <!-- <text x="655" y="500" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle">공지가 없습니다</text> -->

  <!-- 모달 배경 (반투명) -->
  <rect x="0" y="0" width="1200" height="1000" fill="black" opacity="0.5"/>

  <!-- 공지 생성 모달창 -->
  <rect x="300" y="150" width="600" height="700" rx="8" fill="white" filter="drop-shadow(0px 4px 12px rgba(0,0,0,0.3))"/>

  <!-- 모달 헤더 -->
  <rect x="300" y="150" width="600" height="50" rx="8" fill="#f8f9fa"/>
  <text x="320" y="182" font-family="Arial" font-size="18" fill="#333" font-weight="bold">공지 예약 생성</text>
  <text x="870" y="180" font-family="Arial" font-size="24" fill="#6c757d" cursor="pointer">×</text>

  <!-- 모달 내용 -->
  <text x="320" y="230" font-family="Arial" font-size="13" fill="#495057" font-weight="600">공지 유형 <text fill="#dc3545">*</text></text>
  <rect x="320" y="238" width="200" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="330" y="263" font-family="Arial" font-size="13" fill="#495057">공지</text>
  <text x="500" y="263" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

  <!-- 유형 드롭다운 (펼쳐진 상태) -->
  <rect x="320" y="280" width="200" height="90" rx="4" fill="white" stroke="#0d6efd" stroke-width="2" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <rect x="320" y="280" width="200" height="30" rx="4" fill="#e7f5ff"/>
  <text x="330" y="300" font-family="Arial" font-size="12" fill="#0d6efd" font-weight="600">공지</text>
  <rect x="320" y="310" width="200" height="30" rx="4" fill="white"/>
  <text x="330" y="330" font-family="Arial" font-size="12" fill="#495057">안내</text>
  <rect x="320" y="340" width="200" height="30" rx="4" fill="white"/>
  <text x="330" y="360" font-family="Arial" font-size="12" fill="#495057">경고</text>

  <text x="320" y="400" font-family="Arial" font-size="13" fill="#495057" font-weight="600">공지 내용 <text fill="#dc3545">*</text></text>
  <text x="810" y="400" font-family="Arial" font-size="12" fill="#198754" font-weight="600">125 / 500자</text>
  <rect x="320" y="408" width="540" height="140" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="330" y="433" font-family="Arial" font-size="13" fill="#495057">내일 오전 10시부터 서버 점검이 있습니다.</text>
  <text x="330" y="453" font-family="Arial" font-size="13" fill="#495057">약 2시간 정도 소요될 예정이며,</text>
  <text x="330" y="473" font-family="Arial" font-size="13" fill="#495057">점검 중에는 일부 기능이 제한될 수 있습니다.</text>
  <rect x="640" y="518" width="210" height="20" rx="4" fill="#d1e7dd"/>
  <text x="650" y="533" font-family="Arial" font-size="11" fill="#0f5132">✓ 500자 이내 (마스토돈 제한 준수)</text>

  <text x="320" y="580" font-family="Arial" font-size="13" fill="#495057" font-weight="600">예약 시간 <text fill="#dc3545">*</text></text>
  <rect x="320" y="588" width="260" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="330" y="613" font-family="Arial" font-size="13" fill="#495057">2025-01-21</text>
  <text x="460" y="613" font-family="Arial" font-size="13" fill="#adb5bd">📅</text>
  <rect x="600" y="588" width="150" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="610" y="613" font-family="Arial" font-size="13" fill="#495057">09:00</text>
  <text x="730" y="613" font-family="Arial" font-size="13" fill="#adb5bd">🕐</text>

  <!-- 옵션 -->
  <text x="320" y="660" font-family="Arial" font-size="13" fill="#495057" font-weight="600">옵션</text>

  <rect x="320" y="670" width="18" height="18" rx="2" fill="#0d6efd" stroke="#0d6efd" stroke-width="1"/>
  <text x="325" y="685" font-family="Arial" font-size="14" fill="white">✓</text>
  <text x="348" y="685" font-family="Arial" font-size="13" fill="#495057">공개 (유저에게 보임)</text>

  <rect x="520" y="670" width="18" height="18" rx="2" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="548" y="685" font-family="Arial" font-size="13" fill="#495057">멘션 추가 (@everyone)</text>

  <!-- 안내 메시지 -->
  <rect x="320" y="710" width="540" height="90" rx="6" fill="#e7f5ff"/>
  <text x="340" y="735" font-family="Arial" font-size="13" fill="#1971c2" font-weight="600">💡 공지 발송 안내:</text>
  <text x="340" y="760" font-family="Arial" font-size="12" fill="#1971c2">• 예약 시간에 자동으로 공지가 발송됩니다</text>
  <text x="340" y="780" font-family="Arial" font-size="12" fill="#1971c2">• 발송 후에는 수정이 불가능하니 내용을 확인하세요</text>

  <!-- 모달 푸터 -->
  <line x1="300" y1="820" x2="900" y2="820" stroke="#dee2e6" stroke-width="1"/>

  <rect x="680" y="825" width="90" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="725" y="850" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">취소</text>

  <rect x="780" y="825" width="100" height="40" rx="4" fill="#198754"/>
  <text x="830" y="850" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">생성</text>
</svg>
