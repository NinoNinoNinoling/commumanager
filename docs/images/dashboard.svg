<svg width="1200" height="650" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="650" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="650" fill="#2d3748"/>

  <!-- 로고/제목 -->
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <!-- 메뉴 항목들 -->
  <!-- 대시보드 (활성) -->
  <rect x="10" y="70" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="white" font-weight="600">📊 대시보드</text>

  <!-- 유저 관리 -->
  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 유저 관리</text>

  <!-- 재화 -->
  <rect x="10" y="170" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="#a0aec0">💰 재화</text>

  <!-- 콘텐츠 드롭다운 -->
  <rect x="10" y="220" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="#a0aec0">📅 콘텐츠</text>

  <!-- 상점 -->
  <rect x="10" y="270" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <!-- 로그 -->
  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <!-- 설정 -->
  <rect x="10" y="370" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="395" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <text x="240" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">대시보드</text>
  <text x="240" y="75" font-family="Arial" font-size="13" fill="#6c757d">커뮤니티 건강도를 한눈에 확인하세요</text>

  <!-- 1열: 주요 지표 -->
  <text x="240" y="110" font-family="Arial" font-size="14" fill="#495057" font-weight="600">📊 주요 지표</text>

  <!-- 전체 유저 -->
  <rect x="240" y="120" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="150" font-family="Arial" font-size="13" fill="#6c757d">전체 유저</text>
  <text x="260" y="185" font-family="Arial" font-size="32" fill="#333" font-weight="bold">28</text>
  <text x="400" y="195" font-family="Arial" font-size="36" fill="#0d6efd">👥</text>

  <!-- 활성 유저 -->
  <rect x="480" y="120" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="500" y="150" font-family="Arial" font-size="13" fill="#6c757d">활성 유저 (24h)</text>
  <text x="500" y="185" font-family="Arial" font-size="32" fill="#333" font-weight="bold">22</text>
  <text x="640" y="195" font-family="Arial" font-size="36" fill="#198754">✓</text>

  <!-- 위험 유저 -->
  <rect x="720" y="120" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="740" y="150" font-family="Arial" font-size="13" fill="#6c757d">위험 감지 유저</text>
  <text x="740" y="185" font-family="Arial" font-size="32" fill="#333" font-weight="bold">6</text>
  <text x="880" y="195" font-family="Arial" font-size="36" fill="#dc3545">⚠️</text>

  <!-- 어제 총 툿수 -->
  <rect x="960" y="120" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="980" y="150" font-family="Arial" font-size="13" fill="#6c757d">어제 총 툿수</text>
  <text x="980" y="185" font-family="Arial" font-size="32" fill="#333" font-weight="bold">142</text>
  <text x="1120" y="195" font-family="Arial" font-size="36" fill="#0d6efd">💬</text>

  <!-- 2열: 활동량 위험 유형별 현황 -->
  <text x="240" y="250" font-family="Arial" font-size="14" fill="#495057" font-weight="600">⚠️ 활동량 위험 유형별 현황</text>

  <!-- 고립 위험 -->
  <rect x="240" y="260" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <rect x="240" y="260" width="220" height="8" rx="8" fill="#6f42c1"/>
  <text x="260" y="295" font-family="Arial" font-size="13" fill="#6c757d">고립 위험</text>
  <text x="260" y="320" font-family="Arial" font-size="11" fill="#adb5bd">접속 인원 절반 미만</text>
  <text x="260" y="340" font-family="Arial" font-size="28" fill="#333" font-weight="bold">3</text>
  <text x="400" y="350" font-family="Arial" font-size="32" fill="#6f42c1">🎯</text>

  <!-- 편향 위험 -->
  <rect x="480" y="260" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <rect x="480" y="260" width="220" height="8" rx="8" fill="#fd7e14"/>
  <text x="500" y="295" font-family="Arial" font-size="13" fill="#6c757d">편향 위험</text>
  <text x="500" y="320" font-family="Arial" font-size="11" fill="#adb5bd">특정인 10% 이상</text>
  <text x="500" y="340" font-family="Arial" font-size="28" fill="#333" font-weight="bold">2</text>
  <text x="640" y="350" font-family="Arial" font-size="32" fill="#fd7e14">⚖️</text>

  <!-- 회피 패턴 -->
  <rect x="720" y="260" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <rect x="720" y="260" width="220" height="8" rx="8" fill="#dc3545"/>
  <text x="740" y="295" font-family="Arial" font-size="13" fill="#6c757d">회피 패턴</text>
  <text x="740" y="320" font-family="Arial" font-size="11" fill="#adb5bd">주요 멤버 회피</text>
  <text x="740" y="340" font-family="Arial" font-size="28" fill="#333" font-weight="bold">1</text>
  <text x="880" y="350" font-family="Arial" font-size="32" fill="#dc3545">🚫</text>

  <!-- 답글 미달 -->
  <rect x="960" y="260" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <rect x="960" y="260" width="220" height="8" rx="8" fill="#17a2b8"/>
  <text x="980" y="295" font-family="Arial" font-size="13" fill="#6c757d">답글 미달</text>
  <text x="980" y="320" font-family="Arial" font-size="11" fill="#adb5bd">48h 내 5개 미만</text>
  <text x="980" y="340" font-family="Arial" font-size="28" fill="#333" font-weight="bold">2</text>
  <text x="1120" y="350" font-family="Arial" font-size="32" fill="#17a2b8">💬</text>

  <!-- 3열: 관리 현황 -->
  <text x="240" y="390" font-family="Arial" font-size="14" fill="#495057" font-weight="600">📋 관리 현황</text>

  <!-- 휴식 중 -->
  <rect x="240" y="400" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="430" font-family="Arial" font-size="13" fill="#6c757d">휴식 중</text>
  <text x="260" y="465" font-family="Arial" font-size="32" fill="#333" font-weight="bold">3</text>
  <text x="400" y="475" font-family="Arial" font-size="36" fill="#0dcaf0">🏖️</text>

  <!-- 예약 스토리 -->
  <rect x="480" y="400" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="500" y="430" font-family="Arial" font-size="13" fill="#6c757d">예약 스토리</text>
  <text x="500" y="465" font-family="Arial" font-size="32" fill="#333" font-weight="bold">4</text>
  <text x="640" y="475" font-family="Arial" font-size="36" fill="#6f42c1">📹</text>

  <!-- 예약 공지 -->
  <rect x="720" y="400" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="740" y="430" font-family="Arial" font-size="13" fill="#6c757d">예약 공지</text>
  <text x="740" y="465" font-family="Arial" font-size="32" fill="#333" font-weight="bold">2</text>
  <text x="880" y="475" font-family="Arial" font-size="36" fill="#d63384">📢</text>

  <!-- 최근 경고 (7일) -->
  <rect x="960" y="400" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="980" y="430" font-family="Arial" font-size="13" fill="#6c757d">경고 발송 (7일)</text>
  <text x="980" y="465" font-family="Arial" font-size="32" fill="#333" font-weight="bold">5</text>
  <text x="1120" y="475" font-family="Arial" font-size="36" fill="#6c757d">📨</text>

  <!-- 하단 안내 -->
  <rect x="240" y="530" width="940" height="90" rx="8" fill="#e7f5ff" stroke="#339af0" stroke-width="1"/>
  <text x="260" y="560" font-family="Arial" font-size="14" fill="#1971c2" font-weight="600">💡 위험 유형 설명</text>
  <text x="260" y="580" font-family="Arial" font-size="12" fill="#1971c2">• 고립: 대화 상대가 접속 중인 인원의 절반 미만 | • 편향: 특정 1인과 대화 비율 10% 이상</text>
  <text x="260" y="600" font-family="Arial" font-size="12" fill="#1971c2">• 회피: 활발하지만 주요 멤버 회피 (상대방도 활동 중일 때만 감지) | • 답글 미달: 48시간 내 5개 미만</text>
</svg>
