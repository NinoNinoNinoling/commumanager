<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="700" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="700" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 사용자</text>

  <rect x="10" y="170" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="#a0aec0">⚠️ 활동량</text>

  <rect x="10" y="220" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="#a0aec0">🏖️ 휴식</text>

  <rect x="10" y="270" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="#a0aec0">🎉 이벤트</text>

  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <!-- 로그 (활성) -->
  <rect x="10" y="370" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="395" font-family="Arial" font-size="13" fill="white" font-weight="600">📋 로그</text>

  <rect x="10" y="420" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="445" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <text x="240" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">관리자 로그</text>
  <text x="240" y="75" font-family="Arial" font-size="13" fill="#6c757d">시스템 관리자 활동 로그를 실시간으로 모니터링합니다</text>

  <!-- 통계 카드들 -->
  <rect x="240" y="100" width="220" height="80" rx="8" fill="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"/>
  <text x="260" y="125" font-family="Arial" font-size="12" fill="white">총 로그</text>
  <text x="260" y="160" font-family="Arial" font-size="28" fill="white" font-weight="bold">1,523</text>

  <rect x="480" y="100" width="220" height="80" rx="8" fill="linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"/>
  <text x="500" y="125" font-family="Arial" font-size="12" fill="white">현재 페이지</text>
  <text x="500" y="160" font-family="Arial" font-size="28" fill="white" font-weight="bold">1 / 31</text>

  <!-- 필터 영역 -->
  <rect x="240" y="200" width="940" height="100" rx="8" fill="#e9ecef"/>
  <text x="260" y="225" font-family="Arial" font-size="13" fill="#495057" font-weight="600">관리자 필터</text>
  <rect x="260" y="235" width="200" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="270" y="258" font-family="Arial" font-size="13" fill="#495057">전체</text>

  <text x="490" y="225" font-family="Arial" font-size="13" fill="#495057" font-weight="600">액션 타입 필터</text>
  <rect x="490" y="240" width="15" height="15" rx="3" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <text x="512" y="252" font-family="Arial" font-size="12" fill="#495057">재화 조정</text>

  <rect x="610" y="240" width="15" height="15" rx="3" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <text x="632" y="252" font-family="Arial" font-size="12" fill="#495057">경고 발송</text>

  <rect x="730" y="240" width="15" height="15" rx="3" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <text x="752" y="252" font-family="Arial" font-size="12" fill="#495057">휴식 승인</text>

  <!-- 로그 뷰어 (터미널 스타일) -->
  <rect x="240" y="320" width="940" height="270" rx="8" fill="#1e1e1e"/>
  <rect x="240" y="320" width="940" height="40" rx="8" fill="#2d2d30"/>
  <text x="260" y="345" font-family="Courier New" font-size="13" fill="white">🖥️ 로그 뷰어 (라인별)</text>

  <!-- 로그 라인들 -->
  <text x="260" y="380" font-family="Courier New" font-size="11" fill="#569cd6">2025-11-18 14:30:25</text>
  <text x="420" y="380" font-family="Courier New" font-size="11" fill="#4ec9b0">마녀봇</text>
  <text x="510" y="380" font-family="Courier New" font-size="11" fill="#4ec9b0" font-weight="bold">adjust_balance</text>
  <text x="640" y="380" font-family="Courier New" font-size="11" fill="#9cdcfe">→ user_123</text>
  <text x="760" y="380" font-family="Courier New" font-size="11" fill="#ce9178">+1000원 지급</text>

  <text x="260" y="405" font-family="Courier New" font-size="11" fill="#569cd6">2025-11-18 14:15:10</text>
  <text x="420" y="405" font-family="Courier New" font-size="11" fill="#4ec9b0">운영진A</text>
  <text x="510" y="405" font-family="Courier New" font-size="11" fill="#f48771" font-weight="bold">create_warning</text>
  <text x="640" y="405" font-family="Courier New" font-size="11" fill="#9cdcfe">→ user_456</text>
  <text x="760" y="405" font-family="Courier New" font-size="11" fill="#ce9178">활동량 부족 경고</text>

  <text x="260" y="430" font-family="Courier New" font-size="11" fill="#569cd6">2025-11-18 13:45:33</text>
  <text x="420" y="430" font-family="Courier New" font-size="11" fill="#4ec9b0">총괄관리자</text>
  <text x="510" y="430" font-family="Courier New" font-size="11" fill="#4fc1ff" font-weight="bold">create_vacation</text>
  <text x="640" y="430" font-family="Courier New" font-size="11" fill="#9cdcfe">→ user_789</text>
  <text x="760" y="430" font-family="Courier New" font-size="11" fill="#ce9178">휴식 승인 (2025-11-20 ~ 2025-11-27)</text>

  <text x="260" y="455" font-family="Courier New" font-size="11" fill="#569cd6">2025-11-18 13:20:15</text>
  <text x="420" y="455" font-family="Courier New" font-size="11" fill="#4ec9b0">마녀봇</text>
  <text x="510" y="455" font-family="Courier New" font-size="11" fill="#b5cea8" font-weight="bold">create_event</text>
  <text x="640" y="455" font-family="Courier New" font-size="11" fill="#9cdcfe">-</text>
  <text x="760" y="455" font-family="Courier New" font-size="11" fill="#ce9178">신년 이벤트 생성</text>

  <text x="260" y="480" font-family="Courier New" font-size="11" fill="#569cd6">2025-11-18 12:50:42</text>
  <text x="420" y="480" font-family="Courier New" font-size="11" fill="#4ec9b0">운영진B</text>
  <text x="510" y="480" font-family="Courier New" font-size="11" fill="#c586c0" font-weight="bold">update_setting</text>
  <text x="640" y="480" font-family="Courier New" font-size="11" fill="#9cdcfe">-</text>
  <text x="760" y="480" font-family="Courier New" font-size="11" fill="#ce9178">activity_threshold 변경: 20 → 25</text>
</svg>
