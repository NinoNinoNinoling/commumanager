<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 (흐릿하게) -->
  <rect width="1200" height="900" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 (흐릿하게) -->
  <g opacity="0.3">
    <rect width="200" height="900" fill="#2d3748"/>
    <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  </g>

  <!-- 메인 콘텐츠 배경 (흐릿하게) -->
  <g opacity="0.3">
    <text x="340" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">상점 관리</text>
    <text x="340" y="75" font-family="Arial" font-size="13" fill="#6c757d">아이템 및 구매 내역 관리</text>
  </g>

  <!-- 모달 오버레이 -->
  <rect x="0" y="0" width="1200" height="900" fill="#000000" opacity="0.5"/>

  <!-- 모달 창 -->
  <rect x="300" y="60" width="600" height="780" rx="12" fill="white" filter="drop-shadow(0px 8px 24px rgba(0,0,0,0.3))"/>

  <!-- 모달 헤더 -->
  <rect x="300" y="60" width="600" height="60" rx="12" fill="#198754"/>
  <text x="330" y="98" font-family="Arial" font-size="20" fill="white" font-weight="bold">🛒 새 상품 등록</text>

  <!-- 닫기 버튼 -->
  <circle cx="870" cy="90" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="865" y="97" font-family="Arial" font-size="20" fill="white" font-weight="bold">×</text>

  <!-- 모달 본문 -->
  <!-- 상품명 -->
  <text x="330" y="155" font-family="Arial" font-size="14" fill="#495057" font-weight="600">상품명 <text fill="#dc3545">*</text></text>
  <rect x="330" y="165" width="540" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="190" font-family="Arial" font-size="13" fill="#495057">마법 지팡이 스킨</text>

  <!-- 상품 설명 -->
  <text x="330" y="240" font-family="Arial" font-size="14" fill="#495057" font-weight="600">상품 설명 <text fill="#dc3545">*</text></text>
  <rect x="330" y="250" width="540" height="80" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="275" font-family="Arial" font-size="12" fill="#495057">특별한 디자인의 마법 지팡이 스킨입니다.</text>
  <text x="350" y="295" font-family="Arial" font-size="12" fill="#495057">프로필에 표시되는 특수 아이콘이 변경됩니다.</text>

  <!-- 가격 및 재고 -->
  <text x="330" y="365" font-family="Arial" font-size="14" fill="#495057" font-weight="600">가격 <text fill="#dc3545">*</text></text>
  <rect x="330" y="375" width="250" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="400" font-family="Arial" font-size="16" fill="#495057" font-weight="600">5,000</text>
  <text x="550" y="400" font-family="Arial" font-size="14" fill="#6c757d">갈레온</text>

  <text x="620" y="365" font-family="Arial" font-size="14" fill="#495057" font-weight="600">재고 수량</text>
  <rect x="620" y="375" width="250" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="640" y="400" font-family="Arial" font-size="16" fill="#495057">50</text>
  <text x="850" y="400" font-family="Arial" font-size="13" fill="#6c757d">개</text>

  <!-- 재고 무제한 옵션 -->
  <rect x="620" y="425" width="250" height="25" rx="6" fill="transparent"/>
  <rect x="620" y="427" width="18" height="18" rx="3" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <text x="648" y="442" font-family="Arial" font-size="13" fill="#495057">재고 무제한</text>

  <!-- 카테고리 -->
  <text x="330" y="485" font-family="Arial" font-size="14" fill="#495057" font-weight="600">카테고리 <text fill="#dc3545">*</text></text>
  <rect x="330" y="495" width="540" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="520" font-family="Arial" font-size="13" fill="#495057">[스킨/커스터마이징]</text>
  <text x="840" y="520" font-family="Arial" font-size="14" fill="#6c757d">▼</text>

  <!-- 이미지 URL -->
  <text x="330" y="570" font-family="Arial" font-size="14" fill="#495057" font-weight="600">이미지 URL (선택사항)</text>
  <rect x="330" y="580" width="540" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="605" font-family="Arial" font-size="12" fill="#adb5bd">https://example.com/image.png</text>

  <!-- 구매 제한 -->
  <text x="330" y="655" font-family="Arial" font-size="14" fill="#495057" font-weight="600">구매 제한</text>

  <rect x="330" y="670" width="250" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="695" font-family="Arial" font-size="13" fill="#495057">1인당 최대 구매 수량</text>

  <rect x="620" y="670" width="130" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="640" y="695" font-family="Arial" font-size="16" fill="#495057">1</text>
  <text x="730" y="695" font-family="Arial" font-size="13" fill="#6c757d">개</text>

  <rect x="765" y="675" width="105" height="30" rx="6" fill="transparent"/>
  <rect x="765" y="677" width="18" height="18" rx="3" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <text x="793" y="692" font-family="Arial" font-size="13" fill="#495057">제한 없음</text>

  <!-- 판매 상태 -->
  <text x="330" y="745" font-family="Arial" font-size="14" fill="#495057" font-weight="600">판매 상태</text>

  <!-- 판매 중 옵션 (선택됨) -->
  <rect x="330" y="760" width="250" height="60" rx="6" fill="white" stroke="#198754" stroke-width="3"/>
  <circle cx="345" cy="780" r="8" fill="white" stroke="#198754" stroke-width="2"/>
  <circle cx="345" cy="780" r="5" fill="#198754"/>
  <text x="365" y="785" font-family="Arial" font-size="14" fill="#198754" font-weight="600">✅ 판매 중</text>
  <text x="365" y="805" font-family="Arial" font-size="11" fill="#6c757d">즉시 상점에 노출됩니다</text>

  <!-- 판매 중지 옵션 -->
  <rect x="600" y="760" width="270" height="60" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <circle cx="615" cy="780" r="8" fill="white" stroke="#6c757d" stroke-width="2"/>
  <text x="635" y="785" font-family="Arial" font-size="14" fill="#495057">🚫 판매 중지</text>
  <text x="635" y="805" font-family="Arial" font-size="11" fill="#6c757d">상점에 노출되지 않습니다</text>

  <!-- 푸터 버튼 -->
  <line x1="300" y1="770" x2="900" y2="770" stroke="#dee2e6" stroke-width="1"/>

  <rect x="330" y="790" width="240" height="40" rx="6" fill="white" stroke="#6c757d" stroke-width="2"/>
  <text x="450" y="815" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle" font-weight="600">취소</text>

  <rect x="590" y="790" width="280" height="40" rx="6" fill="#198754"/>
  <text x="730" y="815" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">🛒 상품 등록</text>
</svg>
