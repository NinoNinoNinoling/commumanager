  <rect x="240" y="220" width="200" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="255" y="243" font-family="Arial" font-size="13" fill="#495057">전체 카테고리</text>
  <text x="415" y="243" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

  <rect x="460" y="220" width="150" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="475" y="243" font-family="Arial" font-size="13" fill="#495057">전체 상태</text>
  <text x="590" y="243" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

