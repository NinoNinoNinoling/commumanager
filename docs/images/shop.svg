  <rect x="240" y="275" width="300" height="230" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="305" font-family="Arial" font-size="16" fill="#333" font-weight="bold">🪄 마법 지팡이</text>
  <text x="260" y="330" font-family="Arial" font-size="12" fill="#6c757d">올리밴더 지팡이 가게의</text>
  <text x="260" y="345" font-family="Arial" font-size="12" fill="#6c757d">엄선된 마법 지팡이입니다</text>

  <rect x="480" y="290" width="50" height="22" rx="4" fill="#198754"/>
  <text x="505" y="305" font-family="Arial" font-size="11" fill="white" text-anchor="middle">활성</text>

  <rect x="260" y="370" width="120" height="50" rx="6" fill="#f8f9fa"/>
  <text x="320" y="390" font-family="Arial" font-size="11" fill="#6c757d" text-anchor="middle">가격</text>
  <text x="320" y="410" font-family="Arial" font-size="16" fill="#0d6efd" text-anchor="middle" font-weight="bold">5,000원</text>

  <rect x="390" y="370" width="120" height="50" rx="6" fill="#f8f9fa"/>
  <text x="450" y="390" font-family="Arial" font-size="11" fill="#6c757d" text-anchor="middle">ID</text>
  <text x="450" y="410" font-family="Arial" font-size="16" fill="#495057" text-anchor="middle" font-weight="bold">7</text>

  <line x1="260" y1="435" x2="510" y2="435" stroke="#dee2e6" stroke-width="1"/>
  <text x="260" y="455" font-family="Arial" font-size="11" fill="#adb5bd">카테고리: 마법 도구</text>

  <rect x="260" y="465" width="100" height="28" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="310" y="485" font-family="Arial" font-size="12" fill="#0d6efd" text-anchor="middle">편집</text>

  <rect x="370" y="465" width="100" height="28" rx="4" fill="white" stroke="#dc3545" stroke-width="1"/>
  <text x="420" y="485" font-family="Arial" font-size="12" fill="#dc3545" text-anchor="middle">비활성화</text>

  <!-- 아이템 카드 2 -->
  <rect x="560" y="275" width="300" height="230" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="580" y="305" font-family="Arial" font-size="16" fill="#333" font-weight="bold">🍺 버터비어</text>
  <text x="580" y="330" font-family="Arial" font-size="12" fill="#6c757d">호그스미드 마을의 인기 음료</text>
  <text x="580" y="345" font-family="Arial" font-size="12" fill="#6c757d">따뜻하고 달콤합니다</text>

  <rect x="800" y="290" width="50" height="22" rx="4" fill="#198754"/>
  <text x="825" y="305" font-family="Arial" font-size="11" fill="white" text-anchor="middle">활성</text>

  <rect x="580" y="370" width="120" height="50" rx="6" fill="#f8f9fa"/>
  <text x="640" y="390" font-family="Arial" font-size="11" fill="#6c757d" text-anchor="middle">가격</text>
  <text x="640" y="410" font-family="Arial" font-size="16" fill="#0d6efd" text-anchor="middle" font-weight="bold">3,000원</text>

  <rect x="710" y="370" width="120" height="50" rx="6" fill="#f8f9fa"/>
  <text x="770" y="390" font-family="Arial" font-size="11" fill="#6c757d" text-anchor="middle">ID</text>
  <text x="770" y="410" font-family="Arial" font-size="16" fill="#495057" text-anchor="middle" font-weight="bold">11</text>

  <line x1="580" y1="435" x2="830" y2="435" stroke="#dee2e6" stroke-width="1"/>
  <text x="580" y="455" font-family="Arial" font-size="11" fill="#adb5bd">카테고리: 식음료</text>

  <rect x="580" y="465" width="100" height="28" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="630" y="485" font-family="Arial" font-size="12" fill="#0d6efd" text-anchor="middle">편집</text>

  <rect x="690" y="465" width="100" height="28" rx="4" fill="white" stroke="#dc3545" stroke-width="1"/>
  <text x="740" y="485" font-family="Arial" font-size="12" fill="#dc3545" text-anchor="middle">비활성화</text>

