<svg width="1200" height="950" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="950" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="950" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 유저 관리</text>

  <rect x="10" y="170" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="#a0aec0">📅 콘텐츠</text>

  <!-- 상점 (활성) -->
  <rect x="10" y="220" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="white" font-weight="600">🛒 상점</text>

  <rect x="10" y="270" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <!-- 뒤로가기 버튼 -->
  <rect x="240" y="30" width="100" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="290" y="52" font-family="Arial" font-size="13" fill="#495057" text-anchor="middle">← 상점 목록</text>

  <text x="360" y="52" font-family="Arial" font-size="24" fill="#333" font-weight="bold">아이템 추가</text>
  <text x="360" y="77" font-family="Arial" font-size="13" fill="#6c757d">새로운 상점 아이템을 등록합니다</text>

  <!-- 메인 폼 카드 -->
  <rect x="240" y="110" width="600" height="780" rx="8" fill="white" filter="drop-shadow(0px 2px 6px rgba(0,0,0,0.1))"/>

  <!-- 폼 내용 -->
  <text x="270" y="150" font-family="Arial" font-size="16" fill="#333" font-weight="bold">기본 정보</text>
  <line x1="270" y1="160" x2="810" y2="160" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 아이템 이름 -->
  <text x="270" y="195" font-family="Arial" font-size="13" fill="#495057" font-weight="600">아이템 이름 <text fill="#dc3545">*</text></text>
  <rect x="270" y="203" width="510" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="230" font-family="Arial" font-size="14" fill="#495057">황금 스니치</text>

  <!-- 설명 -->
  <text x="270" y="275" font-family="Arial" font-size="13" fill="#495057" font-weight="600">설명</text>
  <rect x="270" y="283" width="510" height="100" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="310" font-family="Arial" font-size="13" fill="#495057">퀴디치 경기에서 사용되는 황금색 공입니다.</text>
  <text x="285" y="330" font-family="Arial" font-size="13" fill="#495057">시커가 이 공을 잡으면 150점을 얻고 경기가 종료됩니다.</text>

  <!-- 가격 및 카테고리 -->
  <text x="270" y="420" font-family="Arial" font-size="16" fill="#333" font-weight="bold">가격 및 분류</text>
  <line x1="270" y1="430" x2="810" y2="430" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 가격 -->
  <text x="270" y="465" font-family="Arial" font-size="13" fill="#495057" font-weight="600">가격 (갈레온) <text fill="#dc3545">*</text></text>
  <rect x="270" y="473" width="240" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="500" font-family="Arial" font-size="14" fill="#495057">10,000</text>
  <text x="460" y="500" font-family="Arial" font-size="12" fill="#6c757d">갈레온</text>

  <!-- 재고 수량 -->
  <text x="540" y="465" font-family="Arial" font-size="13" fill="#495057" font-weight="600">재고 수량</text>
  <rect x="540" y="473" width="240" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="555" y="500" font-family="Arial" font-size="14" fill="#495057">무제한</text>
  <text x="730" y="500" font-family="Arial" font-size="12" fill="#6c757d">개</text>

  <!-- 카테고리 -->
  <text x="270" y="550" font-family="Arial" font-size="13" fill="#495057" font-weight="600">카테고리 <text fill="#dc3545">*</text></text>
  <rect x="270" y="558" width="240" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="585" font-family="Arial" font-size="14" fill="#495057">마법 도구</text>
  <text x="475" y="585" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

  <!-- 정렬 순서 -->
  <text x="540" y="550" font-family="Arial" font-size="13" fill="#495057" font-weight="600">정렬 순서</text>
  <rect x="540" y="558" width="240" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="555" y="585" font-family="Arial" font-size="14" fill="#495057">1</text>
  <text x="730" y="585" font-family="Arial" font-size="12" fill="#6c757d">(낮을수록 상단)</text>

  <!-- 이미지 및 부가정보 -->
  <text x="270" y="640" font-family="Arial" font-size="16" fill="#333" font-weight="bold">이미지 및 부가정보</text>
  <line x1="270" y1="650" x2="810" y2="650" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 이미지 URL -->
  <text x="270" y="685" font-family="Arial" font-size="13" fill="#495057" font-weight="600">이미지 URL (선택)</text>
  <rect x="270" y="693" width="510" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="720" font-family="Arial" font-size="13" fill="#adb5bd">https://example.com/golden-snitch.jpg</text>

  <!-- 이미지 업로드 버튼 -->
  <rect x="270" y="750" width="140" height="35" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="340" y="773" font-family="Arial" font-size="12" fill="#0d6efd" text-anchor="middle">📎 파일 업로드</text>

  <text x="420" y="773" font-family="Arial" font-size="11" fill="#6c757d">또는 URL을 입력하세요</text>

  <!-- 판매 설정 -->
  <text x="270" y="820" font-family="Arial" font-size="16" fill="#333" font-weight="bold">판매 설정</text>
  <line x1="270" y1="830" x2="810" y2="830" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 판매 상태 -->
  <text x="270" y="865" font-family="Arial" font-size="13" fill="#495057" font-weight="600">판매 상태</text>
  <rect x="270" y="873" width="120" height="40" rx="4" fill="#198754"/>
  <text x="330" y="898" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">판매 중</text>

  <rect x="400" y="873" width="120" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="460" y="898" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">판매 중단</text>

  <!-- 버튼 영역 -->
  <line x1="240" y1="860" x2="840" y2="860" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="620" y="850" width="100" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="670" y="875" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">취소</text>

  <rect x="730" y="850" width="110" height="40" rx="4" fill="#0d6efd"/>
  <text x="785" y="875" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">저장</text>

  <!-- 미리보기 카드 (우측) -->
  <rect x="880" y="110" width="300" height="400" rx="8" fill="white" filter="drop-shadow(0px 2px 6px rgba(0,0,0,0.1))"/>

  <text x="900" y="145" font-family="Arial" font-size="14" fill="#6c757d" font-weight="600">미리보기</text>
  <line x1="900" y1="155" x2="1160" y2="155" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 미리보기 아이템 카드 -->
  <rect x="900" y="175" width="260" height="300" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <text x="920" y="205" font-family="Arial" font-size="16" fill="#333" font-weight="bold">⚡ 황금 스니치</text>
  <text x="920" y="230" font-family="Arial" font-size="12" fill="#6c757d">퀴디치 경기에서 사용되는</text>
  <text x="920" y="245" font-family="Arial" font-size="12" fill="#6c757d">황금색 공입니다.</text>

  <rect x="1100" y="190" width="50" height="22" rx="4" fill="#198754"/>
  <text x="1125" y="205" font-family="Arial" font-size="11" fill="white" text-anchor="middle">활성</text>

  <rect x="920" y="270" width="110" height="50" rx="6" fill="white"/>
  <text x="975" y="290" font-family="Arial" font-size="11" fill="#6c757d" text-anchor="middle">가격</text>
  <text x="975" y="310" font-family="Arial" font-size="16" fill="#0d6efd" text-anchor="middle" font-weight="bold">10,000</text>

  <rect x="1040" y="270" width="110" height="50" rx="6" fill="white"/>
  <text x="1095" y="290" font-family="Arial" font-size="11" fill="#6c757d" text-anchor="middle">재고</text>
  <text x="1095" y="310" font-family="Arial" font-size="16" fill="#495057" text-anchor="middle" font-weight="bold">무제한</text>

  <line x1="920" y1="335" x2="1140" y2="335" stroke="#dee2e6" stroke-width="1"/>
  <text x="920" y="355" font-family="Arial" font-size="11" fill="#adb5bd">카테고리: 마법 도구</text>

  <rect x="920" y="370" width="110" height="28" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="975" y="390" font-family="Arial" font-size="12" fill="#0d6efd" text-anchor="middle">편집</text>

  <rect x="1040" y="370" width="110" height="28" rx="4" fill="#198754"/>
  <text x="1095" y="390" font-family="Arial" font-size="12" fill="white" text-anchor="middle">구매하기</text>

  <text x="920" y="430" font-family="Arial" font-size="11" fill="#6c757d">* 사용자에게 이렇게 표시됩니다</text>

  <!-- 도움말 카드 -->
  <rect x="880" y="530" width="300" height="180" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="900" y="560" font-family="Arial" font-size="13" fill="#856404" font-weight="600">💡 아이템 추가 팁</text>

  <text x="900" y="585" font-family="Arial" font-size="11" fill="#856404">• 가격은 유저 활동량을 고려하여 설정하세요</text>
  <text x="900" y="605" font-family="Arial" font-size="11" fill="#856404">• 설명은 간결하고 매력적으로 작성하세요</text>
  <text x="900" y="625" font-family="Arial" font-size="11" fill="#856404">• 이미지가 있으면 구매율이 높아집니다</text>
  <text x="900" y="645" font-family="Arial" font-size="11" fill="#856404">• 재고 무제한은 디지털 상품에 적합합니다</text>
  <text x="900" y="665" font-family="Arial" font-size="11" fill="#856404">• 정렬 순서로 상점 내 위치를 조정합니다</text>
  <text x="900" y="685" font-family="Arial" font-size="11" fill="#856404">• 비활성 상태로도 저장할 수 있습니다</text>

  <!-- 카테고리 안내 -->
  <rect x="880" y="730" width="300" height="160" rx="8" fill="#e7f5ff" stroke="#0d6efd" stroke-width="1"/>
  <text x="900" y="760" font-family="Arial" font-size="13" fill="#084298" font-weight="600">📋 사용 가능한 카테고리</text>

  <text x="900" y="785" font-family="Arial" font-size="12" fill="#084298">• 마법 도구 (지팡이, 빗자루 등)</text>
  <text x="900" y="805" font-family="Arial" font-size="12" fill="#084298">• 식음료 (버터비어, 초콜릿 등)</text>
  <text x="900" y="825" font-family="Arial" font-size="12" fill="#084298">• 마법 재료 (약 재료, 물약 등)</text>
  <text x="900" y="845" font-family="Arial" font-size="12" fill="#084298">• 의류/액세서리 (가면, 로브 등)</text>
  <text x="900" y="865" font-family="Arial" font-size="12" fill="#084298">• 서적 (교과서, 마법서 등)</text>
</svg>
