  <text x="300" y="895" font-family="Arial" font-size="12" fill="#6c757d">2025-10-31 19:00</text>
  <text x="450" y="895" font-family="Arial" font-size="12" fill="#495057" font-weight="600">종료:</text>
  <text x="490" y="895" font-family="Arial" font-size="12" fill="#6c757d">2025-11-01 02:00</text>

