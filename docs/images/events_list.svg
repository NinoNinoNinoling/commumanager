  <text x="260" y="830" font-family="Arial" font-size="13" fill="#6c757d">대강당에서 진행된 할로윈 코스튬 파티</text>

  <rect x="260" y="845" width="70" height="24" rx="4" fill="#dc3545"/>
  <text x="295" y="862" font-family="Arial" font-size="11" fill="white" text-anchor="middle">특별</text>

  <rect x="340" y="845" width="70" height="24" rx="4" fill="#6c757d"/>
