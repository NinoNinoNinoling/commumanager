<svg width="1200" height="1050" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="1050" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="1050" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 유저 관리</text>

  <rect x="10" y="170" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="#a0aec0">💰 재화</text>

  <!-- 콘텐츠 (활성) -->
  <rect x="10" y="220" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="white" font-weight="600">📅 콘텐츠</text>

  <rect x="10" y="270" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="370" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="395" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <!-- 뒤로가기 버튼 -->
  <rect x="240" y="30" width="80" height="32" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="280" y="50" font-family="Arial" font-size="13" fill="#495057" text-anchor="middle">← 목록</text>

  <text x="340" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">일정 상세 및 스토리 포스트 관리</text>
  <text x="340" y="75" font-family="Arial" font-size="13" fill="#6c757d">일정에 연결된 스토리 포스트를 관리합니다</text>

  <!-- 일정 정보 카드 -->
  <rect x="240" y="95" width="940" height="140" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="125" font-family="Arial" font-size="18" fill="#333" font-weight="bold">🏰 호그스미드 방문 주간</text>

  <rect x="260" y="140" width="60" height="22" rx="4" fill="#6f42c1"/>
  <text x="290" y="155" font-family="Arial" font-size="11" fill="white" text-anchor="middle">외출</text>

  <rect x="330" y="140" width="70" height="22" rx="4" fill="#198754"/>
  <text x="365" y="155" font-family="Arial" font-size="11" fill="white" text-anchor="middle">진행 중</text>

  <text x="260" y="185" font-family="Arial" font-size="13" fill="#6c757d">마법 마을 호그스미드 자유 방문 기간, 특별 상점 할인 적용</text>

  <text x="260" y="210" font-family="Arial" font-size="12" fill="#495057" font-weight="600">시작:</text>
  <text x="300" y="210" font-family="Arial" font-size="12" fill="#6c757d">2025-11-15 10:00</text>
  <text x="450" y="210" font-family="Arial" font-size="12" fill="#495057" font-weight="600">종료:</text>
  <text x="490" y="210" font-family="Arial" font-size="12" fill="#6c757d">2025-11-21 23:59</text>
  <text x="640" y="210" font-family="Arial" font-size="12" fill="#495057" font-weight="600">간격:</text>
  <text x="680" y="210" font-family="Arial" font-size="12" fill="#6c757d">5분</text>

  <rect x="1000" y="195" width="160" height="32" rx="4" fill="#198754"/>
  <text x="1080" y="215" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="600">+ 포스트 추가</text>

  <!-- 포스트 목록 -->
  <text x="240" y="270" font-family="Arial" font-size="16" fill="#333" font-weight="bold">스토리 포스트 목록 (3개)</text>

  <rect x="1000" y="250" width="180" height="32" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="1090" y="270" font-family="Arial" font-size="13" fill="#0d6efd" text-anchor="middle">📊 엑셀 업로드</text>

  <!-- 포스트 카드 1 -->
  <rect x="240" y="295" width="940" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>

  <rect x="260" y="310" width="60" height="60" rx="4" fill="#e9ecef"/>
  <text x="290" y="345" font-family="Arial" font-size="24" fill="#adb5bd" text-anchor="middle">🖼️</text>

  <text x="335" y="330" font-family="Arial" font-size="14" fill="#333" font-weight="600">포스트 #1</text>
  <text x="335" y="350" font-family="Arial" font-size="12" fill="#6c757d">호그스미드 마을에 오신 것을 환영합니다! ✨ 오늘부터 일주일간 자유롭게...</text>
  <text x="335" y="370" font-family="Arial" font-size="11" fill="#adb5bd">발송 예정: 2025-11-15 10:00 | 글자수: 78/500 | 이미지: 1개</text>

  <rect x="1000" y="315" width="70" height="28" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="1035" y="333" font-family="Arial" font-size="12" fill="#0d6efd" text-anchor="middle">편집</text>

  <rect x="1080" y="315" width="70" height="28" rx="4" fill="white" stroke="#dc3545" stroke-width="1"/>
  <text x="1115" y="333" font-family="Arial" font-size="12" fill="#dc3545" text-anchor="middle">삭제</text>

  <!-- 포스트 카드 2 -->
  <rect x="240" y="410" width="940" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>

  <rect x="260" y="425" width="60" height="60" rx="4" fill="#e9ecef"/>
  <text x="290" y="460" font-family="Arial" font-size="24" fill="#adb5bd" text-anchor="middle">🖼️</text>

  <text x="335" y="445" font-family="Arial" font-size="14" fill="#333" font-weight="600">포스트 #2</text>
  <text x="335" y="465" font-family="Arial" font-size="12" fill="#6c757d">허니듀크 과자 가게에서 특별 할인 중! 🍬 버터비어와 초콜릿 개구리...</text>
  <text x="335" y="485" font-family="Arial" font-size="11" fill="#adb5bd">발송 예정: 2025-11-15 10:05 | 글자수: 62/500 | 이미지: 2개</text>

  <rect x="1000" y="430" width="70" height="28" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="1035" y="448" font-family="Arial" font-size="12" fill="#0d6efd" text-anchor="middle">편집</text>

  <rect x="1080" y="430" width="70" height="28" rx="4" fill="white" stroke="#dc3545" stroke-width="1"/>
  <text x="1115" y="448" font-family="Arial" font-size="12" fill="#dc3545" text-anchor="middle">삭제</text>

  <!-- 포스트 카드 3 -->
  <rect x="240" y="525" width="940" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>

  <text x="260" y="555" font-family="Arial" font-size="14" fill="#333" font-weight="600">포스트 #3</text>
  <text x="260" y="575" font-family="Arial" font-size="12" fill="#6c757d">쓰리 브룸스틱스 여관에서 점심 추천 메뉴를 소개합니다! 🍺🍖</text>
  <text x="260" y="595" font-family="Arial" font-size="11" fill="#adb5bd">발송 예정: 2025-11-15 10:10 | 글자수: 45/500 | 이미지: 없음</text>

  <rect x="1000" y="545" width="70" height="28" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="1035" y="563" font-family="Arial" font-size="12" fill="#0d6efd" text-anchor="middle">편집</text>

  <rect x="1080" y="545" width="70" height="28" rx="4" fill="white" stroke="#dc3545" stroke-width="1"/>
  <text x="1115" y="563" font-family="Arial" font-size="12" fill="#dc3545" text-anchor="middle">삭제</text>

  <!-- 모달 배경 (반투명) -->
  <rect x="0" y="0" width="1200" height="1050" fill="black" opacity="0.5"/>

  <!-- 포스트 추가/편집 모달창 -->
  <rect x="250" y="80" width="700" height="890" rx="8" fill="white" filter="drop-shadow(0px 4px 12px rgba(0,0,0,0.3))"/>

  <!-- 모달 헤더 -->
  <rect x="250" y="80" width="700" height="50" rx="8" fill="#f8f9fa"/>
  <text x="270" y="112" font-family="Arial" font-size="18" fill="#333" font-weight="bold">스토리 포스트 추가</text>
  <text x="920" y="110" font-family="Arial" font-size="24" fill="#6c757d" cursor="pointer">×</text>

  <!-- 모달 내용 -->
  <text x="270" y="160" font-family="Arial" font-size="13" fill="#495057" font-weight="600">포스트 내용 <text fill="#dc3545">*</text></text>
  <text x="850" y="160" font-family="Arial" font-size="12" fill="#198754" font-weight="600">45 / 500자</text>
  <rect x="270" y="168" width="650" height="120" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="280" y="193" font-family="Arial" font-size="13" fill="#495057">호그스미드 마을에 오신 것을 환영합니다! ✨</text>
  <text x="280" y="213" font-family="Arial" font-size="13" fill="#495057">오늘부터 일주일간 자유롭게 마을을 둘러보세요.</text>
  <rect x="700" y="258" width="210" height="20" rx="4" fill="#d1e7dd"/>
  <text x="710" y="273" font-family="Arial" font-size="11" fill="#0f5132">✓ 500자 이내 (마스토돈 제한 준수)</text>

  <!-- 이미지 업로드 -->
  <text x="270" y="320" font-family="Arial" font-size="13" fill="#495057" font-weight="600">이미지 첨부 (최대 4개)</text>
  <rect x="270" y="328" width="650" height="220" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- 이미지 미리보기 1 -->
  <rect x="290" y="348" width="140" height="140" rx="4" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <rect x="290" y="348" width="140" height="105" rx="4" fill="#e9ecef"/>
  <text x="360" y="405" font-family="Arial" font-size="32" fill="#adb5bd" text-anchor="middle">🖼️</text>
  <text x="360" y="470" font-family="Arial" font-size="11" fill="#495057" text-anchor="middle">hogsmeade.jpg</text>
  <rect x="410" y="353" width="15" height="15" rx="2" fill="#dc3545"/>
  <text x="417" y="364" font-family="Arial" font-size="10" fill="white" text-anchor="middle">×</text>

  <!-- 이미지 업로드 박스 2 (빈 슬롯) -->
  <rect x="450" y="348" width="140" height="140" rx="4" fill="white" stroke="#ced4da" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="520" y="415" font-family="Arial" font-size="36" fill="#adb5bd" text-anchor="middle">+</text>
  <text x="520" y="435" font-family="Arial" font-size="11" fill="#6c757d" text-anchor="middle">클릭하여 업로드</text>

  <!-- 이미지 업로드 박스 3 (빈 슬롯) -->
  <rect x="610" y="348" width="140" height="140" rx="4" fill="white" stroke="#ced4da" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="680" y="415" font-family="Arial" font-size="36" fill="#adb5bd" text-anchor="middle">+</text>

  <!-- 이미지 업로드 박스 4 (빈 슬롯) -->
  <rect x="770" y="348" width="140" height="140" rx="4" fill="white" stroke="#ced4da" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="840" y="415" font-family="Arial" font-size="36" fill="#adb5bd" text-anchor="middle">+</text>

  <text x="270" y="530" font-family="Arial" font-size="11" fill="#6c757d">지원 형식: JPG, PNG, GIF (최대 10MB)</text>

  <!-- ALT 텍스트 입력 -->
  <text x="270" y="570" font-family="Arial" font-size="13" fill="#495057" font-weight="600">이미지 설명 (ALT 텍스트)</text>
  <text x="875" y="570" font-family="Arial" font-size="11" fill="#6c757d">(접근성 필수)</text>
  <rect x="270" y="578" width="650" height="80" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="280" y="603" font-family="Arial" font-size="13" fill="#495057">호그스미드 마을의 전경. 눈 덮인 지붕과 아늑한 상점들이 보이는 모습</text>

  <!-- 발송 시간 계산 안내 -->
  <rect x="270" y="680" width="650" height="70" rx="4" fill="#e7f5ff" stroke="#339af0" stroke-width="1"/>
  <text x="290" y="705" font-family="Arial" font-size="13" fill="#1971c2" font-weight="600">📌 발송 예정 시간</text>
  <text x="290" y="725" font-family="Arial" font-size="12" fill="#1971c2">이 포스트는 2025-11-15 10:00에 발송됩니다</text>
  <text x="290" y="740" font-family="Arial" font-size="11" fill="#1971c2">(일정 시작 시간 기준, 포스트 순서에 따라 5분 간격으로 자동 계산)</text>

  <!-- 마스토돈 제한 안내 -->
  <rect x="270" y="770" width="650" height="90" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="290" y="795" font-family="Arial" font-size="13" fill="#856404" font-weight="600">⚠️ 마스토돈 툿 제한 사항</text>
  <text x="290" y="815" font-family="Arial" font-size="12" fill="#856404">• 텍스트: 최대 500자</text>
  <text x="290" y="835" font-family="Arial" font-size="12" fill="#856404">• 이미지: 최대 4개 (각 10MB 이하)</text>
  <text x="290" y="855" font-family="Arial" font-size="12" fill="#856404">• 모든 이미지에 ALT 텍스트 권장 (접근성)</text>

  <!-- 모달 푸터 -->
  <line x1="250" y1="895" x2="950" y2="895" stroke="#dee2e6" stroke-width="1"/>

  <rect x="730" y="915" width="90" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="775" y="940" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">취소</text>

  <rect x="830" y="915" width="100" height="40" rx="4" fill="#0d6efd"/>
  <text x="880" y="940" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">저장</text>
</svg>
