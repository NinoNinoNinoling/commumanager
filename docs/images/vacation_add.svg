<svg width="1200" height="850" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 (흐릿하게) -->
  <rect width="1200" height="850" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 (흐릿하게) -->
  <g opacity="0.3">
    <rect width="200" height="850" fill="#2d3748"/>
    <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  </g>

  <!-- 메인 콘텐츠 배경 (흐릿하게) -->
  <g opacity="0.3">
    <text x="340" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">유저 관리</text>
    <text x="340" y="75" font-family="Arial" font-size="13" fill="#6c757d">활동량 모니터링, 휴식 현황, 재화 관리</text>
  </g>

  <!-- 모달 오버레이 -->
  <rect x="0" y="0" width="1200" height="850" fill="#000000" opacity="0.5"/>

  <!-- 모달 창 -->
  <rect x="300" y="80" width="600" height="690" rx="12" fill="white" filter="drop-shadow(0px 8px 24px rgba(0,0,0,0.3))"/>

  <!-- 모달 헤더 -->
  <rect x="300" y="80" width="600" height="60" rx="12" fill="#0dcaf0"/>
  <text x="330" y="118" font-family="Arial" font-size="20" fill="white" font-weight="bold">🏖️ 휴식 등록</text>

  <!-- 닫기 버튼 -->
  <circle cx="870" cy="110" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="865" y="117" font-family="Arial" font-size="20" fill="white" font-weight="bold">×</text>

  <!-- 모달 본문 -->
  <!-- 대상 유저 선택 -->
  <text x="330" y="175" font-family="Arial" font-size="14" fill="#495057" font-weight="600">대상 유저 <text fill="#dc3545">*</text></text>
  <rect x="330" y="185" width="540" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="210" font-family="Arial" font-size="13" fill="#495057">@user123 (김민준)</text>
  <text x="840" y="210" font-family="Arial" font-size="14" fill="#6c757d">▼</text>

  <!-- 휴식 시작일 -->
  <text x="330" y="260" font-family="Arial" font-size="14" fill="#495057" font-weight="600">휴식 시작일 <text fill="#dc3545">*</text></text>
  <rect x="330" y="270" width="250" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="295" font-family="Arial" font-size="13" fill="#495057">2025-11-20</text>
  <text x="550" y="295" font-family="Arial" font-size="14" fill="#6c757d">📅</text>

  <!-- 휴식 종료일 -->
  <text x="620" y="260" font-family="Arial" font-size="14" fill="#495057" font-weight="600">휴식 종료일 <text fill="#dc3545">*</text></text>
  <rect x="620" y="270" width="250" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="640" y="295" font-family="Arial" font-size="13" fill="#495057">2025-11-27</text>
  <text x="840" y="295" font-family="Arial" font-size="14" fill="#6c757d">📅</text>

  <!-- 휴식 기간 요약 -->
  <rect x="330" y="325" width="540" height="35" rx="6" fill="#e7f5ff"/>
  <text x="350" y="348" font-family="Arial" font-size="13" fill="#1971c2">📊 휴식 기간: 7일 (2025-11-20 ~ 2025-11-27)</text>

  <!-- 휴식 사유 -->
  <text x="330" y="395" font-family="Arial" font-size="14" fill="#495057" font-weight="600">휴식 사유 <text fill="#dc3545">*</text></text>
  <rect x="330" y="405" width="540" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="430" font-family="Arial" font-size="13" fill="#495057">개인 사정으로 인한 휴식</text>

  <!-- 상세 설명 -->
  <text x="330" y="480" font-family="Arial" font-size="14" fill="#495057" font-weight="600">상세 설명 (선택사항)</text>
  <rect x="330" y="490" width="540" height="80" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="350" y="515" font-family="Arial" font-size="12" fill="#adb5bd">휴식 사유에 대한 추가 설명이나 메모를 입력하세요</text>

  <!-- 자동 처리 옵션 -->
  <text x="330" y="605" font-family="Arial" font-size="14" fill="#495057" font-weight="600">자동 처리 옵션</text>

  <rect x="330" y="620" width="540" height="30" rx="6" fill="transparent"/>
  <rect x="330" y="622" width="18" height="18" rx="3" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <rect x="332" y="624" width="14" height="14" rx="2" fill="#0d6efd"/>
  <text x="358" y="637" font-family="Arial" font-size="13" fill="#495057">휴식 기간 동안 활동량 모니터링 일시 중지</text>

  <rect x="330" y="660" width="540" height="30" rx="6" fill="transparent"/>
  <rect x="330" y="662" width="18" height="18" rx="3" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <rect x="332" y="664" width="14" height="14" rx="2" fill="#0d6efd"/>
  <text x="358" y="677" font-family="Arial" font-size="13" fill="#495057">종료일에 자동으로 휴식 상태 해제</text>

  <!-- 안내 메시지 -->
  <rect x="330" y="710" width="540" height="50" rx="6" fill="#d1ecf1"/>
  <text x="350" y="735" font-family="Arial" font-size="13" fill="#0c5460" font-weight="600">ℹ️ 휴식 등록 안내</text>
  <text x="350" y="752" font-family="Arial" font-size="11" fill="#0c5460">휴식 중인 유저는 경고 대상에서 제외되며, 별도 아이콘으로 표시됩니다.</text>

  <!-- 푸터 버튼 -->
  <line x1="300" y1="700" x2="900" y2="700" stroke="#dee2e6" stroke-width="1"/>

  <rect x="330" y="720" width="240" height="40" rx="6" fill="white" stroke="#6c757d" stroke-width="2"/>
  <text x="450" y="745" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle" font-weight="600">취소</text>

  <rect x="590" y="720" width="280" height="40" rx="6" fill="#0dcaf0"/>
  <text x="730" y="745" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">🏖️ 휴식 등록</text>
</svg>
