<svg width="1200" height="1050" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="1050" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="1050" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 유저 관리</text>

  <!-- 콘텐츠 (활성) -->
  <rect x="10" y="170" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="white" font-weight="600">📅 콘텐츠</text>

  <rect x="10" y="220" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <rect x="10" y="270" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <!-- 뒤로가기 버튼 -->
  <rect x="240" y="30" width="100" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="290" y="52" font-family="Arial" font-size="13" fill="#495057" text-anchor="middle">← 일정 목록</text>

  <text x="360" y="52" font-family="Arial" font-size="24" fill="#333" font-weight="bold">일정 등록</text>
  <text x="360" y="77" font-family="Arial" font-size="13" fill="#6c757d">새로운 일정을 등록합니다</text>

  <!-- 메인 폼 카드 -->
  <rect x="240" y="110" width="640" height="900" rx="8" fill="white" filter="drop-shadow(0px 2px 6px rgba(0,0,0,0.1))"/>

  <!-- 폼 내용 -->
  <text x="270" y="150" font-family="Arial" font-size="16" fill="#333" font-weight="bold">기본 정보</text>
  <line x1="270" y1="160" x2="850" y2="160" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 일정 유형 선택 -->
  <text x="270" y="195" font-family="Arial" font-size="13" fill="#495057" font-weight="600">일정 유형 <text fill="#dc3545">*</text></text>

  <rect x="270" y="203" width="140" height="40" rx="4" fill="#0d6efd"/>
  <text x="340" y="228" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="600">일반 일정</text>

  <rect x="420" y="203" width="140" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="490" y="228" font-family="Arial" font-size="13" fill="#495057" text-anchor="middle">스토리 일정</text>

  <!-- 일정 제목 -->
  <text x="270" y="280" font-family="Arial" font-size="13" fill="#495057" font-weight="600">일정 제목 <text fill="#dc3545">*</text></text>
  <rect x="270" y="288" width="550" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="315" font-family="Arial" font-size="14" fill="#495057">봄맞이 축제</text>

  <!-- 설명 -->
  <text x="270" y="360" font-family="Arial" font-size="13" fill="#495057" font-weight="600">설명</text>
  <rect x="270" y="368" width="550" height="100" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="395" font-family="Arial" font-size="13" fill="#495057">봄을 맞이하여 대강당에서 축제를 개최합니다.</text>
  <text x="285" y="415" font-family="Arial" font-size="13" fill="#495057">모든 학생들의 참여를 환영합니다.</text>

  <!-- 날짜 및 시간 -->
  <text x="270" y="510" font-family="Arial" font-size="16" fill="#333" font-weight="bold">날짜 및 시간</text>
  <line x1="270" y1="520" x2="850" y2="520" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 시작 날짜/시간 -->
  <text x="270" y="555" font-family="Arial" font-size="13" fill="#495057" font-weight="600">시작 날짜 <text fill="#dc3545">*</text></text>
  <rect x="270" y="563" width="240" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="590" font-family="Arial" font-size="14" fill="#495057">2025-03-15</text>
  <text x="480" y="590" font-family="Arial" font-size="13" fill="#adb5bd">📅</text>

  <text x="540" y="555" font-family="Arial" font-size="13" fill="#495057" font-weight="600">시작 시간</text>
  <rect x="540" y="563" width="240" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="555" y="590" font-family="Arial" font-size="14" fill="#495057">14:00</text>
  <text x="750" y="590" font-family="Arial" font-size="13" fill="#adb5bd">🕐</text>

  <!-- 종료 날짜/시간 -->
  <text x="270" y="635" font-family="Arial" font-size="13" fill="#495057" font-weight="600">종료 날짜</text>
  <rect x="270" y="643" width="240" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="670" font-family="Arial" font-size="14" fill="#495057">2025-03-17</text>
  <text x="480" y="670" font-family="Arial" font-size="13" fill="#adb5bd">📅</text>

  <text x="540" y="635" font-family="Arial" font-size="13" fill="#495057" font-weight="600">종료 시간</text>
  <rect x="540" y="643" width="240" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="555" y="670" font-family="Arial" font-size="14" fill="#495057">23:59</text>
  <text x="750" y="670" font-family="Arial" font-size="13" fill="#adb5bd">🕐</text>

  <!-- 분류 및 설정 -->
  <text x="270" y="730" font-family="Arial" font-size="16" fill="#333" font-weight="bold">분류 및 설정</text>
  <line x1="270" y1="740" x2="850" y2="740" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 카테고리 -->
  <text x="270" y="775" font-family="Arial" font-size="13" fill="#495057" font-weight="600">카테고리 <text fill="#dc3545">*</text></text>
  <rect x="270" y="783" width="260" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="285" y="810" font-family="Arial" font-size="14" fill="#495057">커뮤니티 이벤트</text>
  <text x="505" y="810" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

  <!-- 소속 기간 -->
  <text x="560" y="775" font-family="Arial" font-size="13" fill="#495057" font-weight="600">소속 기간</text>
  <rect x="560" y="783" width="220" height="42" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="575" y="810" font-family="Arial" font-size="14" fill="#495057">Period 3</text>
  <text x="755" y="810" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

  <!-- 옵션 체크박스 -->
  <text x="270" y="865" font-family="Arial" font-size="16" fill="#333" font-weight="bold">옵션</text>
  <line x1="270" y1="875" x2="850" y2="875" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 공개 일정 체크박스 -->
  <rect x="270" y="893" width="20" height="20" rx="3" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="275" y="910" font-family="Arial" font-size="16" fill="#198754">✓</text>
  <text x="300" y="910" font-family="Arial" font-size="14" fill="#495057">공개 일정 (유저가 @봇 일정으로 조회 가능)</text>

  <!-- 리뉴얼 기간 체크박스 -->
  <rect x="270" y="923" width="20" height="20" rx="3" fill="#6f42c1" stroke="#6f42c1" stroke-width="1"/>
  <text x="275" y="940" font-family="Arial" font-size="16" fill="white">✓</text>
  <text x="300" y="940" font-family="Arial" font-size="14" fill="#495057">리뉴얼 기간 (활동량 체크 및 출석 트윗 중단)</text>

  <rect x="300" y="948" width="500" height="50" rx="4" fill="#fff3cd"/>
  <text x="310" y="968" font-family="Arial" font-size="11" fill="#856404">⚠️ 리뉴얼 기간으로 설정하면 해당 기간 동안:</text>
  <text x="310" y="985" font-family="Arial" font-size="11" fill="#856404">• 활동량 체크 중단 • 출석 트윗 중단 • 재화 지급 중단</text>

  <!-- 버튼 영역 -->
  <line x1="240" y1="980" x2="880" y2="980" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="670" y="970" width="100" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="720" y="995" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">취소</text>

  <rect x="780" y="970" width="100" height="40" rx="4" fill="#0d6efd"/>
  <text x="830" y="995" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">등록</text>

  <!-- 우측 도움말 영역 -->
  <rect x="900" y="110" width="280" height="220" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="920" y="140" font-family="Arial" font-size="13" fill="#856404" font-weight="600">💡 일정 등록 팁</text>

  <text x="920" y="165" font-family="Arial" font-size="11" fill="#856404">• 일정 유형:</text>
  <text x="930" y="182" font-family="Arial" font-size="11" fill="#856404">- 일반 일정: 단순 기간/이벤트</text>
  <text x="930" y="199" font-family="Arial" font-size="11" fill="#856404">- 스토리 일정: 여러 포스트 예약 발송</text>

  <text x="920" y="220" font-family="Arial" font-size="11" fill="#856404">• 공개 일정은 유저들이 조회 가능합니다</text>
  <text x="920" y="237" font-family="Arial" font-size="11" fill="#856404">• 리뉴얼 기간은 시스템 점검용입니다</text>
  <text x="920" y="254" font-family="Arial" font-size="11" fill="#856404">• 종료 날짜는 선택사항입니다</text>
  <text x="920" y="271" font-family="Arial" font-size="11" fill="#856404">• 소속 기간으로 일정을 분류합니다</text>

  <text x="920" y="295" font-family="Arial" font-size="11" fill="#856404" font-weight="600">※ 스토리 일정 특징:</text>
  <text x="920" y="312" font-family="Arial" font-size="11" fill="#856404">시작 시간부터 설정한 간격마다</text>
  <text x="920" y="325" font-family="Arial" font-size="11" fill="#856404">포스트가 자동 발송됩니다</text>

  <!-- 카테고리 안내 -->
  <rect x="900" y="350" width="280" height="180" rx="8" fill="#e7f5ff" stroke="#0d6efd" stroke-width="1"/>
  <text x="920" y="380" font-family="Arial" font-size="13" fill="#084298" font-weight="600">📋 사용 가능한 카테고리</text>

  <text x="920" y="405" font-family="Arial" font-size="12" fill="#084298">• 커뮤니티 이벤트 (축제, 파티 등)</text>
  <text x="920" y="425" font-family="Arial" font-size="12" fill="#084298">• 공휴일 (크리스마스, 부활절 등)</text>
  <text x="920" y="445" font-family="Arial" font-size="12" fill="#084298">• 정기 이벤트 (주간 퀴즈 등)</text>
  <text x="920" y="465" font-family="Arial" font-size="12" fill="#084298">• 스토리 (연재 포스트)</text>
  <text x="920" y="485" font-family="Arial" font-size="12" fill="#084298">• 외출/방문 (호그스미드 등)</text>
  <text x="920" y="505" font-family="Arial" font-size="12" fill="#084298">• 기타</text>

  <!-- 스토리 일정 안내 -->
  <rect x="900" y="550" width="280" height="200" rx="8" fill="#d1ecf1" stroke="#0dcaf0" stroke-width="1"/>
  <text x="920" y="580" font-family="Arial" font-size="13" fill="#055160" font-weight="600">📖 스토리 일정이란?</text>

  <text x="920" y="605" font-family="Arial" font-size="11" fill="#055160">여러 개의 포스트를 일정 간격으로</text>
  <text x="920" y="620" font-family="Arial" font-size="11" fill="#055160">자동 발송하는 기능입니다.</text>

  <text x="920" y="645" font-family="Arial" font-size="11" fill="#055160" font-weight="600">예시: 마법사의 돌 찾기</text>
  <text x="920" y="662" font-family="Arial" font-size="11" fill="#055160">• 시작: 2025-11-25 20:00</text>
  <text x="920" y="679" font-family="Arial" font-size="11" fill="#055160">• 간격: 5분</text>
  <text x="920" y="696" font-family="Arial" font-size="11" fill="#055160">• 포스트: 5개</text>

  <text x="920" y="718" font-family="Arial" font-size="11" fill="#055160">→ 20:00, 20:05, 20:10, 20:15, 20:20에</text>
  <text x="920" y="733" font-family="Arial" font-size="11" fill="#055160">각각 포스트가 자동 발송됩니다.</text>

  <!-- 주의사항 -->
  <rect x="900" y="770" width="280" height="100" rx="8" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="920" y="800" font-family="Arial" font-size="13" fill="#721c24" font-weight="600">⚠️ 주의사항</text>

  <text x="920" y="825" font-family="Arial" font-size="11" fill="#721c24">• 일정 등록 후 수정 가능하지만,</text>
  <text x="920" y="842" font-family="Arial" font-size="11" fill="#721c24">  이미 발송된 포스트는 수정 불가</text>
  <text x="920" y="859" font-family="Arial" font-size="11" fill="#721c24">• 리뉴얼 기간은 신중하게 설정하세요</text>
</svg>
