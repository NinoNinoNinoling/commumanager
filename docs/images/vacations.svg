<svg width="1200" height="590" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="590" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="590" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <!-- 유저 관리 (활성) -->
  <rect x="10" y="120" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="white" font-weight="600">👥 유저 관리</text>

  <rect x="10" y="170" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="#a0aec0">📅 콘텐츠</text>

  <rect x="10" y="220" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <rect x="10" y="270" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <text x="240" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">유저 관리</text>
  <text x="240" y="75" font-family="Arial" font-size="13" fill="#6c757d">활동량 모니터링, 휴식 현황, 재화 관리</text>

  <!-- 탭 메뉴 -->
  <rect x="240" y="95" width="940" height="50" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>

  <!-- 탭 1: 활동량 모니터링 -->
  <rect x="250" y="105" width="150" height="35" rx="6" fill="transparent"/>
  <text x="325" y="128" font-family="Arial" font-size="13" fill="#6c757d" text-anchor="middle">⚠️ 활동량 모니터링</text>

  <!-- 탭 2: 휴식 현황 (활성) -->
  <rect x="410" y="105" width="120" height="35" rx="6" fill="#0d6efd"/>
  <text x="470" y="128" font-family="Arial" font-size="13" fill="white" font-weight="600" text-anchor="middle">🏖️ 휴식 현황</text>

  <!-- 탭 3: 재화 관리 -->
  <rect x="540" y="105" width="120" height="35" rx="6" fill="transparent"/>
  <text x="600" y="128" font-family="Arial" font-size="13" fill="#6c757d" text-anchor="middle">💰 재화 관리</text>

  <!-- 휴식 현황 탭 내용 -->

  <!-- 통계 카드들 (2개로 단순화) -->
  <rect x="240" y="165" width="350" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="195" font-family="Arial" font-size="13" fill="#6c757d">현재 휴식 중</text>
  <text x="260" y="230" font-family="Arial" font-size="32" fill="#333" font-weight="bold">2</text>
  <text x="520" y="240" font-family="Arial" font-size="36" fill="#198754">🏖️</text>

  <rect x="610" y="165" width="350" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="630" y="195" font-family="Arial" font-size="13" fill="#6c757d">오늘 종료 예정</text>
  <text x="630" y="230" font-family="Arial" font-size="32" fill="#333" font-weight="bold">1</text>
  <text x="890" y="240" font-family="Arial" font-size="36" fill="#ffc107">⏰</text>

  <!-- 휴식 등록 버튼 -->
  <rect x="980" y="165" width="180" height="45" rx="6" fill="#198754"/>
  <text x="1070" y="193" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">🏖️ 휴식 등록</text>

  <!-- 할당량 안내 -->
  <rect x="240" y="230" width="920" height="35" rx="8" fill="#fff3cd"/>
  <text x="260" y="252" font-family="Arial" font-size="13" fill="#856404">💡 휴식 할당량: <text font-weight="600">1개월당 3일</text> (설정에서 변경 가능)</text>

  <!-- 필터 영역 -->
  <rect x="240" y="285" width="920" height="60" rx="8" fill="#e9ecef"/>
  <text x="260" y="310" font-family="Arial" font-size="13" fill="#495057" font-weight="600">사용자 검색</text>
  <rect x="260" y="320" width="250" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="270" y="343" font-family="Arial" font-size="13" fill="#adb5bd">사용자명 입력...</text>

  <rect x="540" y="320" width="100" height="35" rx="4" fill="#0d6efd"/>
  <text x="590" y="343" font-family="Arial" font-size="13" fill="white" text-anchor="middle">검색</text>

  <!-- 상태 체크박스 -->
  <text x="670" y="310" font-family="Arial" font-size="13" fill="#495057" font-weight="600">상태</text>
  <rect x="670" y="320" width="18" height="18" rx="3" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <text x="675" y="335" font-family="Arial" font-size="14" fill="#0d6efd">✓</text>
  <text x="695" y="335" font-family="Arial" font-size="13" fill="#495057">진행 중만 표시</text>

  <!-- 휴식 목록 테이블 -->
  <rect x="240" y="365" width="920" height="40" rx="8" fill="#f8f9fa"/>
  <text x="260" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="600">사용자</text>
  <text x="360" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="600">시작일</text>
  <text x="460" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="600">종료일</text>
  <text x="560" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="600">기간</text>
  <text x="625" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="600">사유</text>
  <text x="780" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="600">이번 달 사용</text>
  <text x="920" y="390" font-family="Arial" font-size="12" fill="#495057" font-weight="600">작업</text>

  <!-- 휴식 목록 행 1 (진행 중) -->
  <line x1="240" y1="405" x2="1160" y2="405" stroke="#dee2e6" stroke-width="1"/>
  <text x="260" y="435" font-family="Arial" font-size="13" fill="#0d6efd">@user789</text>
  <text x="380" y="435" font-family="Arial" font-size="13" fill="#495057">2025-11-18</text>
  <text x="490" y="435" font-family="Arial" font-size="13" fill="#495057">2025-11-25</text>
  <text x="600" y="435" font-family="Arial" font-size="13" fill="#6c757d">7일</text>
  <text x="670" y="435" font-family="Arial" font-size="12" fill="#6c757d">개인 사정</text>
  <text x="840" y="435" font-family="Arial" font-size="13" fill="#dc3545" font-weight="600">3/3일</text>
  <rect x="960" y="420" width="50" height="24" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="985" y="437" font-family="Arial" font-size="11" fill="#0d6efd" text-anchor="middle">수정</text>
  <rect x="1020" y="420" width="80" height="24" rx="4" fill="#dc3545"/>
  <text x="1060" y="437" font-family="Arial" font-size="11" fill="white" text-anchor="middle">강제 해제</text>

  <!-- 휴식 목록 행 2 (진행 중, 이번 주 종료) -->
  <line x1="240" y1="455" x2="1160" y2="455" stroke="#dee2e6" stroke-width="1"/>
  <text x="260" y="485" font-family="Arial" font-size="13" fill="#0d6efd">@user234</text>
  <text x="380" y="485" font-family="Arial" font-size="13" fill="#495057">2025-11-15</text>
  <text x="490" y="485" font-family="Arial" font-size="13" fill="#495057">2025-11-24</text>
  <text x="600" y="485" font-family="Arial" font-size="13" fill="#6c757d">9일</text>
  <text x="670" y="485" font-family="Arial" font-size="12" fill="#6c757d">여행</text>
  <text x="840" y="485" font-family="Arial" font-size="13" fill="#ffc107" font-weight="600">2/3일</text>
  <rect x="960" y="470" width="50" height="24" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="985" y="487" font-family="Arial" font-size="11" fill="#0d6efd" text-anchor="middle">수정</text>
  <rect x="1020" y="470" width="80" height="24" rx="4" fill="#dc3545"/>
  <text x="1060" y="487" font-family="Arial" font-size="11" fill="white" text-anchor="middle">강제 해제</text>

  <!-- 페이지네이션 -->
  <rect x="500" y="525" width="240" height="40" rx="6" fill="white" filter="drop-shadow(0px 1px 3px rgba(0,0,0,0.1))"/>
  <rect x="510" y="535" width="70" height="24" rx="4" fill="#6c757d"/>
  <text x="545" y="552" font-family="Arial" font-size="12" fill="white" text-anchor="middle">이전</text>

  <rect x="595" y="535" width="30" height="24" rx="4" fill="#0d6efd"/>
  <text x="610" y="552" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">1</text>

  <rect x="640" y="535" width="70" height="24" rx="4" fill="#e9ecef"/>
  <text x="675" y="552" font-family="Arial" font-size="12" fill="#6c757d" text-anchor="middle">다음</text>
</svg>
