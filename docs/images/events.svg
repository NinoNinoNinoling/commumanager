  <text x="625" y="593" font-family="Arial" font-size="14" fill="#198754">✓</text>
  <text x="648" y="593" font-family="Arial" font-size="13" fill="#495057">공개 일정 (유저가 @봇 일정으로 조회 가능)</text>

  <rect x="620" y="608" width="18" height="18" rx="2" fill="#6f42c1" stroke="#6f42c1" stroke-width="1"/>
  <text x="625" y="623" font-family="Arial" font-size="14" fill="white">✓</text>
  <text x="648" y="623" font-family="Arial" font-size="13" fill="#495057">리뉴얼 기간 (리뉴얼 기간)</text>

  <rect x="648" y="633" width="200" height="60" rx="4" fill="#fff3cd"/>
  <text x="658" y="653" font-family="Arial" font-size="11" fill="#856404">리뉴얼 기간 설정 시:</text>
  <text x="658" y="668" font-family="Arial" font-size="11" fill="#856404">• 활동량 체크 중단</text>
  <text x="658" y="683" font-family="Arial" font-size="11" fill="#856404">• 출석 트윗 중단</text>

