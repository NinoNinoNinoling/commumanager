<svg width="1200" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="1000" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="1000" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 유저 관리</text>

  <!-- 콘텐츠 (활성) -->
  <rect x="10" y="170" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="white" font-weight="600">📅 콘텐츠</text>

  <rect x="10" y="220" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <rect x="10" y="270" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <text x="240" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">일정 및 이벤트 관리</text>
  <text x="240" y="75" font-family="Arial" font-size="13" fill="#6c757d">커뮤니티 일정을 관리하고 리뉴얼 기간을 설정합니다</text>

  <!-- 버튼들 -->
  <rect x="860" y="35" width="160" height="40" rx="4" fill="#6f42c1"/>
  <text x="940" y="60" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">🔄 리뉴얼 기간 설정</text>

  <rect x="1040" y="35" width="140" height="40" rx="4" fill="#198754"/>
  <text x="1110" y="60" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">+ 일정 등록</text>

  <!-- 통계 카드들 -->
  <rect x="240" y="100" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="130" font-family="Arial" font-size="13" fill="#6c757d">전체 일정</text>
  <text x="260" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">15</text>
  <text x="390" y="175" font-family="Arial" font-size="36" fill="#0d6efd">📅</text>

  <rect x="480" y="100" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="500" y="130" font-family="Arial" font-size="13" fill="#6c757d">진행 중</text>
  <text x="500" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">3</text>
  <text x="650" y="175" font-family="Arial" font-size="36" fill="#198754">▶️</text>

  <rect x="720" y="100" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="740" y="130" font-family="Arial" font-size="13" fill="#6c757d">예정</text>
  <text x="740" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">5</text>
  <text x="890" y="175" font-family="Arial" font-size="36" fill="#ffc107">⏳</text>

  <rect x="960" y="100" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="980" y="130" font-family="Arial" font-size="13" fill="#6c757d">종료</text>
  <text x="980" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">7</text>
  <text x="1130" y="175" font-family="Arial" font-size="36" fill="#6c757d">✓</text>

  <!-- 필터 및 검색 -->
  <text x="240" y="230" font-family="Arial" font-size="14" fill="#495057" font-weight="600">필터 및 검색</text>

  <rect x="240" y="240" width="200" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="255" y="263" font-family="Arial" font-size="13" fill="#495057">전체 학기/기간</text>
  <text x="415" y="263" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

  <rect x="460" y="240" width="150" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="475" y="263" font-family="Arial" font-size="13" fill="#495057">전체 상태</text>
  <text x="590" y="263" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

  <rect x="630" y="240" width="150" height="35" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="645" y="263" font-family="Arial" font-size="13" fill="#495057">전체 유형</text>
  <text x="760" y="263" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

  <!-- 현재 기간 정보 -->
  <rect x="240" y="295" width="940" height="60" rx="8" fill="#e7f5ff" stroke="#339af0" stroke-width="1"/>
  <text x="260" y="320" font-family="Arial" font-size="14" fill="#1971c2" font-weight="600">📌 현재 러닝 기간: Period 3 (2025-01-01 ~ 2025-06-30)</text>
  <text x="260" y="340" font-family="Arial" font-size="12" fill="#1971c2">러닝 기간 중이므로 커뮤니티가 정상 운영되며, 활동량 체크 및 재화 지급이 활성화됩니다 | 다음 리뉴얼: 2025-07-01</text>

  <!-- 일정 카드 1 -->
  <rect x="240" y="375" width="460" height="160" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="405" font-family="Arial" font-size="16" fill="#333" font-weight="bold">🏰 호그스미드 방문 주간</text>
  <text x="260" y="430" font-family="Arial" font-size="13" fill="#6c757d">마법 마을 호그스미드 자유 방문 기간</text>

  <rect x="260" y="445" width="60" height="22" rx="4" fill="#6f42c1"/>
  <text x="290" y="460" font-family="Arial" font-size="11" fill="white" text-anchor="middle">외출</text>

  <rect x="330" y="445" width="70" height="22" rx="4" fill="#198754"/>
  <text x="365" y="460" font-family="Arial" font-size="11" fill="white" text-anchor="middle">진행 중</text>

  <rect x="410" y="445" width="15" height="22" fill="transparent"/>
  <text x="415" y="460" font-family="Arial" font-size="20" fill="#198754">✓</text>
  <text x="430" y="460" font-family="Arial" font-size="11" fill="#6c757d">공개</text>

  <text x="260" y="490" font-family="Arial" font-size="12" fill="#495057" font-weight="600">시작:</text>
  <text x="300" y="490" font-family="Arial" font-size="12" fill="#6c757d">2025-11-15 10:00</text>
  <text x="450" y="490" font-family="Arial" font-size="12" fill="#495057" font-weight="600">종료:</text>
  <text x="490" y="490" font-family="Arial" font-size="12" fill="#6c757d">2025-11-21 23:59</text>

  <text x="260" y="510" font-family="Arial" font-size="11" fill="#adb5bd">Period 3 | 관리자: 총괄</text>

  <rect x="260" y="515" width="80" height="25" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="300" y="533" font-family="Arial" font-size="12" fill="#0d6efd" text-anchor="middle">상세</text>

  <!-- 일정 카드 2 -->
  <rect x="720" y="375" width="460" height="160" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="740" y="405" font-family="Arial" font-size="16" fill="#333" font-weight="bold">🎄 크리스마스 대연회</text>
  <text x="740" y="430" font-family="Arial" font-size="13" fill="#6c757d">대강당에서 펼쳐지는 연말 축제</text>

  <rect x="740" y="445" width="60" height="22" rx="4" fill="#dc3545"/>
  <text x="770" y="460" font-family="Arial" font-size="11" fill="white" text-anchor="middle">특별</text>

  <rect x="810" y="445" width="70" height="22" rx="4" fill="#ffc107"/>
  <text x="845" y="460" font-family="Arial" font-size="11" fill="#212529" text-anchor="middle">예정</text>

  <rect x="890" y="445" width="15" height="22" fill="transparent"/>
  <text x="895" y="460" font-family="Arial" font-size="20" fill="#198754">✓</text>
  <text x="910" y="460" font-family="Arial" font-size="11" fill="#6c757d">공개</text>

  <text x="740" y="490" font-family="Arial" font-size="12" fill="#495057" font-weight="600">시작:</text>
  <text x="780" y="490" font-family="Arial" font-size="12" fill="#6c757d">2025-12-24 18:00</text>
  <text x="930" y="490" font-family="Arial" font-size="12" fill="#495057" font-weight="600">종료:</text>
  <text x="970" y="490" font-family="Arial" font-size="12" fill="#6c757d">2025-12-26 23:59</text>

  <text x="740" y="510" font-family="Arial" font-size="11" fill="#adb5bd">Period 3 | 관리자: 마녀봇</text>

  <rect x="740" y="515" width="80" height="25" rx="4" fill="white" stroke="#0d6efd" stroke-width="1"/>
  <text x="780" y="533" font-family="Arial" font-size="12" fill="#0d6efd" text-anchor="middle">상세</text>
</svg>
