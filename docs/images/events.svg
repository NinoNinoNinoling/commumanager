  <rect x="320" y="748" width="240" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="330" y="773" font-family="Arial" font-size="13" fill="#495057">Period 3 (현재 러닝 기간)</text>
  <text x="540" y="773" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

