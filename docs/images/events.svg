<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="1200" height="700" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="700" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 사용자</text>

  <rect x="10" y="170" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="#a0aec0">⚠️ 활동량</text>

  <rect x="10" y="220" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="#a0aec0">🏖️ 휴식</text>

  <!-- 이벤트 (활성) -->
  <rect x="10" y="270" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="white" font-weight="600">🎉 이벤트</text>

  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <rect x="10" y="370" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="395" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="420" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="445" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 메인 콘텐츠 영역 -->
  <text x="240" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">이벤트 관리</text>
  <text x="240" y="75" font-family="Arial" font-size="13" fill="#6c757d">커뮤니티 이벤트를 조회하고 관리합니다</text>

  <!-- 통계 카드들 -->
  <rect x="240" y="100" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="130" font-family="Arial" font-size="13" fill="#6c757d">전체 이벤트</text>
  <text x="260" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">15</text>
  <text x="390" y="175" font-family="Arial" font-size="36" fill="#0d6efd">📅</text>

  <rect x="480" y="100" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="500" y="130" font-family="Arial" font-size="13" fill="#6c757d">진행 중</text>
  <text x="500" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">3</text>
  <text x="650" y="175" font-family="Arial" font-size="36" fill="#198754">▶️</text>

  <rect x="720" y="100" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="740" y="130" font-family="Arial" font-size="13" fill="#6c757d">예정</text>
  <text x="740" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">5</text>
  <text x="890" y="175" font-family="Arial" font-size="36" fill="#ffc107">⏳</text>

  <rect x="960" y="100" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="980" y="130" font-family="Arial" font-size="13" fill="#6c757d">종료</text>
  <text x="980" y="165" font-family="Arial" font-size="32" fill="#333" font-weight="bold">7</text>
  <text x="1130" y="175" font-family="Arial" font-size="36" fill="#6c757d">✓</text>

  <!-- 이벤트 카드 1 -->
  <rect x="240" y="220" width="460" height="160" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="260" y="250" font-family="Arial" font-size="16" fill="#333" font-weight="bold">🏰 호그스미드 방문 주간</text>
  <text x="260" y="275" font-family="Arial" font-size="13" fill="#6c757d">마법 마을 호그스미드 자유 방문 기간, 특별 상점 할인</text>

  <rect x="260" y="290" width="60" height="22" rx="4" fill="#6f42c1"/>
  <text x="290" y="305" font-family="Arial" font-size="11" fill="white" text-anchor="middle">외출</text>

  <rect x="330" y="290" width="70" height="22" rx="4" fill="#198754"/>
  <text x="365" y="305" font-family="Arial" font-size="11" fill="white" text-anchor="middle">진행 중</text>

  <rect x="410" y="290" width="15" height="22" fill="transparent"/>
  <text x="415" y="305" font-family="Arial" font-size="20" fill="#198754">✓</text>
  <text x="430" y="305" font-family="Arial" font-size="11" fill="#6c757d">공개</text>

  <text x="260" y="335" font-family="Arial" font-size="12" fill="#495057" font-weight="600">시작:</text>
  <text x="300" y="335" font-family="Arial" font-size="12" fill="#6c757d">2025-11-15 10:00</text>
  <text x="450" y="335" font-family="Arial" font-size="12" fill="#495057" font-weight="600">종료:</text>
  <text x="490" y="335" font-family="Arial" font-size="12" fill="#6c757d">2025-11-21 23:59</text>

  <text x="260" y="355" font-family="Arial" font-size="11" fill="#adb5bd">생성일: 2025-11-01 | 관리자: 총괄관리자</text>

  <!-- 이벤트 카드 2 -->
  <rect x="720" y="220" width="460" height="160" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
  <text x="740" y="250" font-family="Arial" font-size="16" fill="#333" font-weight="bold">🎄 크리스마스 대연회</text>
  <text x="740" y="275" font-family="Arial" font-size="13" fill="#6c757d">대강당에서 펼쳐지는 연말 축제, 특별 보상 및 이벤트</text>

  <rect x="740" y="290" width="60" height="22" rx="4" fill="#dc3545"/>
  <text x="770" y="305" font-family="Arial" font-size="11" fill="white" text-anchor="middle">특별</text>

  <rect x="810" y="290" width="70" height="22" rx="4" fill="#ffc107"/>
  <text x="845" y="305" font-family="Arial" font-size="11" fill="#212529" text-anchor="middle">예정</text>

  <rect x="890" y="290" width="15" height="22" fill="transparent"/>
  <text x="895" y="305" font-family="Arial" font-size="20" fill="#198754">✓</text>
  <text x="910" y="305" font-family="Arial" font-size="11" fill="#6c757d">공개</text>

  <text x="740" y="335" font-family="Arial" font-size="12" fill="#495057" font-weight="600">시작:</text>
  <text x="780" y="335" font-family="Arial" font-size="12" fill="#6c757d">2025-12-24 18:00</text>
  <text x="930" y="335" font-family="Arial" font-size="12" fill="#495057" font-weight="600">종료:</text>
  <text x="970" y="335" font-family="Arial" font-size="12" fill="#6c757d">2025-12-26 23:59</text>

  <text x="740" y="355" font-family="Arial" font-size="11" fill="#adb5bd">생성일: 2025-12-01 | 관리자: 마녀봇</text>
</svg>
