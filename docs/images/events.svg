  <text x="840" y="413" font-family="Arial" font-size="13" fill="#adb5bd">📅</text>

  <text x="620" y="460" font-family="Arial" font-size="13" fill="#495057" font-weight="600">종료 시간</text>
  <rect x="620" y="468" width="240" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="630" y="493" font-family="Arial" font-size="13" fill="#495057">23:59</text>
  <text x="840" y="493" font-family="Arial" font-size="13" fill="#adb5bd">🕐</text>

  <text x="320" y="540" font-family="Arial" font-size="13" fill="#495057" font-weight="600">일정 유형 <text fill="#dc3545">*</text></text>
  <rect x="320" y="548" width="240" height="40" rx="4" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="330" y="573" font-family="Arial" font-size="13" fill="#495057">커뮤니티 이벤트</text>
  <text x="540" y="573" font-family="Arial" font-size="13" fill="#adb5bd">▼</text>

