<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 (어둡게) -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- 왼쪽 사이드바 -->
  <rect width="200" height="800" fill="#2d3748"/>
  <text x="20" y="35" font-family="Arial" font-size="16" fill="white" font-weight="bold">✨ 마녀봇 관리</text>
  <line x1="20" y1="50" x2="180" y2="50" stroke="#4a5568" stroke-width="1"/>

  <rect x="10" y="70" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="95" font-family="Arial" font-size="13" fill="#a0aec0">📊 대시보드</text>

  <rect x="10" y="120" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="145" font-family="Arial" font-size="13" fill="#a0aec0">👥 사용자</text>

  <!-- 활동량 (활성) -->
  <rect x="10" y="170" width="180" height="40" rx="6" fill="#4299e1"/>
  <text x="30" y="195" font-family="Arial" font-size="13" fill="white" font-weight="600">⚠️ 활동량</text>

  <rect x="10" y="220" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="245" font-family="Arial" font-size="13" fill="#a0aec0">🎉 이벤트</text>

  <rect x="10" y="270" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="295" font-family="Arial" font-size="13" fill="#a0aec0">🛒 상점</text>

  <rect x="10" y="320" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="345" font-family="Arial" font-size="13" fill="#a0aec0">📋 로그</text>

  <rect x="10" y="370" width="180" height="40" rx="6" fill="transparent"/>
  <text x="30" y="395" font-family="Arial" font-size="13" fill="#a0aec0">⚙️ 설정</text>

  <!-- 흐릿한 배경 콘텐츠 (warnings.svg의 일부) -->
  <g opacity="0.3">
    <text x="240" y="50" font-family="Arial" font-size="24" fill="#333" font-weight="bold">활동량 모니터링</text>

    <rect x="240" y="100" width="220" height="100" rx="8" fill="white" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.1))"/>
    <text x="260" y="130" font-family="Arial" font-size="13" fill="#6c757d">위험군 (0~9개)</text>
    <text x="260" y="165" font-family="Arial" font-size="32" fill="#dc3545" font-weight="bold">3명</text>
  </g>

  <!-- 모달 오버레이 -->
  <rect x="0" y="0" width="1200" height="800" fill="#000000" opacity="0.5"/>

  <!-- 모달 창 -->
  <rect x="300" y="80" width="600" height="620" rx="12" fill="white" filter="drop-shadow(0px 8px 24px rgba(0,0,0,0.3))"/>

  <!-- 모달 헤더 -->
  <rect x="300" y="80" width="600" height="60" rx="12" fill="#dc3545"/>
  <text x="330" y="118" font-family="Arial" font-size="20" fill="white" font-weight="bold">⚠️ 수동 경고 발송</text>

  <!-- 닫기 버튼 -->
  <circle cx="870" cy="110" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="865" y="117" font-family="Arial" font-size="20" fill="white" font-weight="bold">×</text>

  <!-- 모달 본문 -->
  <!-- 1. 대상 유저 선택 -->
  <text x="330" y="175" font-family="Arial" font-size="14" fill="#495057" font-weight="600">1. 대상 유저 선택</text>
  <rect x="330" y="185" width="520" height="40" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="345" y="210" font-family="Arial" font-size="13" fill="#495057">@user456 (김서연) 검색...</text>
  <text x="820" y="210" font-family="Arial" font-size="18" fill="#6c757d">🔍</text>

  <!-- 유저 정보 미리보기 -->
  <rect x="330" y="235" width="520" height="80" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="350" y="260" font-family="Arial" font-size="13" fill="#0d6efd" font-weight="600">@user456</text>
  <text x="430" y="260" font-family="Arial" font-size="11" fill="#6c757d">(김서연)</text>

  <text x="350" y="285" font-family="Arial" font-size="12" fill="#495057">48시간 답글: </text>
  <text x="445" y="285" font-family="Arial" font-size="12" fill="#dc3545" font-weight="bold">5개</text>
  <text x="480" y="285" font-family="Arial" font-size="11" fill="#dc3545">(위험)</text>

  <text x="350" y="305" font-family="Arial" font-size="12" fill="#495057">경고 횟수: </text>
  <text x="430" y="305" font-family="Arial" font-size="12" fill="#333" font-weight="bold">1회</text>
  <text x="470" y="305" font-family="Arial" font-size="11" fill="#6c757d">(최근 7일)</text>

  <!-- 2. 템플릿 선택 -->
  <text x="330" y="345" font-family="Arial" font-size="14" fill="#495057" font-weight="600">2. 경고 템플릿 선택</text>

  <!-- 템플릿 옵션 1 -->
  <circle cx="340" cy="368" r="8" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <circle cx="340" cy="368" r="5" fill="#0d6efd"/>
  <text x="360" y="373" font-family="Arial" font-size="13" fill="#333">활동량 부족 경고</text>

  <!-- 템플릿 옵션 2 -->
  <circle cx="540" cy="368" r="8" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <text x="560" y="373" font-family="Arial" font-size="13" fill="#333">규칙 위반 경고</text>

  <!-- 템플릿 옵션 3 -->
  <circle cx="720" cy="368" r="8" fill="white" stroke="#0d6efd" stroke-width="2"/>
  <text x="740" y="373" font-family="Arial" font-size="13" fill="#333">사용자 정의</text>

  <!-- 3. 메시지 작성 -->
  <text x="330" y="410" font-family="Arial" font-size="14" fill="#495057" font-weight="600">3. 경고 메시지 작성</text>
  <text x="755" y="410" font-family="Arial" font-size="11" fill="#6c757d">0 / 500자</text>

  <rect x="330" y="420" width="520" height="140" rx="6" fill="white" stroke="#ced4da" stroke-width="1"/>
  <text x="345" y="445" font-family="Arial" font-size="12" fill="#495057">안녕하세요, 마녀봇입니다.</text>
  <text x="345" y="465" font-family="Arial" font-size="12" fill="#495057"></text>
  <text x="345" y="485" font-family="Arial" font-size="12" fill="#495057">최근 48시간 동안 활동량(답글 3개)이 기준(5개)에</text>
  <text x="345" y="505" font-family="Arial" font-size="12" fill="#495057">미달하여 경고 메시지를 발송합니다.</text>
  <text x="345" y="525" font-family="Arial" font-size="12" fill="#495057"></text>
  <text x="345" y="545" font-family="Arial" font-size="12" fill="#495057">커뮤니티 참여 부탁드립니다. 😊</text>

  <!-- 주의 사항 -->
  <rect x="330" y="575" width="520" height="60" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="350" y="595" font-family="Arial" font-size="12" fill="#856404" font-weight="600">⚠️ 주의사항</text>
  <text x="350" y="615" font-family="Arial" font-size="11" fill="#856404">• 경고는 DM으로 발송되며, 발송 후 취소할 수 없습니다.</text>
  <text x="350" y="628" font-family="Arial" font-size="11" fill="#856404">• 모든 경고 발송은 관리 로그에 영구 기록됩니다.</text>

  <!-- 버튼 영역 -->
  <rect x="330" y="650" width="240" height="40" rx="6" fill="white" stroke="#6c757d" stroke-width="2"/>
  <text x="450" y="675" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle" font-weight="600">취소</text>

  <rect x="590" y="650" width="260" height="40" rx="6" fill="#dc3545"/>
  <text x="720" y="675" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="600">⚠️ 경고 DM 발송하기</text>
</svg>
