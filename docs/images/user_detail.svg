  <text x="260" y="460" font-family="Arial" font-size="12" fill="#495057">2025-11-20 16:00</text>
  <text x="400" y="460" font-family="Arial" font-size="12" fill="#198754" font-weight="600">+840원</text>
  <text x="520" y="460" font-family="Arial" font-size="12" fill="#6c757d">정산 지급 (답글 84개)</text>

  <text x="260" y="490" font-family="Arial" font-size="12" fill="#495057">2025-11-19 04:00</text>
  <text x="400" y="490" font-family="Arial" font-size="12" fill="#198754" font-weight="600">+920원</text>
  <text x="520" y="490" font-family="Arial" font-size="12" fill="#6c757d">정산 지급 (답글 92개)</text>

  <text x="260" y="520" font-family="Arial" font-size="12" fill="#495057">2025-11-18 10:30</text>
