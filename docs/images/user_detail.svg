  <text x="260" y="550" font-family="Arial" font-size="12" fill="#495057">2025-11-17 16:00</text>
  <text x="400" y="550" font-family="Arial" font-size="12" fill="#198754" font-weight="600">+750원</text>
  <text x="520" y="550" font-family="Arial" font-size="12" fill="#6c757d">정산 지급 (답글 75개)</text>

