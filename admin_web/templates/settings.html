{% extends "base.html" %}
{% block title %}시스템 설정{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h1 class="page-title">시스템 설정</h1>
    <p class="page-subtitle">봇 동작 및 시스템 파라미터를 조정합니다</p>
</div>

<!-- 활동량 체크 설정 -->
<div class="card mb-3">
    <div class="card-body">
        <h5 class="mb-4">⏰ 활동량 체크 설정</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">체크 주기</label>
                <div class="d-flex gap-2">
                    <div class="input-group">
                        <span class="input-group-text">🕐</span>
                        <input type="time" class="form-control" value="04:00">
                    </div>
                    <div class="input-group">
                        <span class="input-group-text">🕐</span>
                        <input type="time" class="form-control" value="16:00">
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">최소 답글 기준 (48시간)</label>
                <input type="number" class="form-control" value="5" min="1">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">고립 위험 기준 (명)</label>
                <input type="number" class="form-control" value="3" min="1">
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary">저장</button>
        </div>
    </div>
</div>

<!-- 재화 지급 설정 -->
<div class="card mb-3">
    <div class="card-body">
        <h5 class="mb-4">💰 재화 지급 설정</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">답글 100개당 지급액</label>
                <div class="input-group">
                    <input type="number" class="form-control" value="100" min="0">
                    <span class="input-group-text">갈레온</span>
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">일일 출석 보상</label>
                <div class="input-group">
                    <input type="number" class="form-control" value="10" min="0">
                    <span class="input-group-text">갈레온</span>
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">신규 가입 보상</label>
                <div class="input-group">
                    <input type="number" class="form-control" value="1000" min="0">
                    <span class="input-group-text">갈레온</span>
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary">저장</button>
        </div>
    </div>
</div>

<!-- 경고 시스템 설정 -->
<div class="card mb-3">
    <div class="card-body">
        <h5 class="mb-4">⚠️ 경고 시스템 설정</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">최대 경고 횟수</label>
                <input type="number" class="form-control" value="3" min="1">
                <small class="text-muted">이 횟수 초과 시 자동 밴</small>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">경고 초기화 (일)</label>
                <input type="number" class="form-control" value="90" min="1">
                <small class="text-muted">지정 일수 후 경고 1개 감소</small>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">자동 경고 발송</label>
                <select class="form-select">
                    <option>활성화</option>
                    <option>비활성화</option>
                </select>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary">저장</button>
        </div>
    </div>
</div>

<!-- 알림 설정 -->
<div class="card mb-3">
    <div class="card-body">
        <h5 class="mb-4">🔔 알림 설정</h5>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="notify1" checked>
            <label class="form-check-label" for="notify1">
                위험 유저 감지 시 관리자에게 알림
            </label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="notify2" checked>
            <label class="form-check-label" for="notify2">
                스토리 이벤트 발송 완료 시 알림
            </label>
        </div>
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="notify3">
            <label class="form-check-label" for="notify3">
                일일 통계 리포트 발송
            </label>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary">저장</button>
        </div>
    </div>
</div>

<!-- Mastodon 인스턴스 설정 -->
<div class="card mb-3">
    <div class="card-body">
        <h5 class="mb-4">🌐 Mastodon 인스턴스 설정</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">인스턴스 URL</label>
                <input type="url" class="form-control" placeholder="https://mastodon.example.com">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">봇 계정 Access Token</label>
                <input type="password" class="form-control" placeholder="액세스 토큰 입력">
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-primary">저장</button>
            <button class="btn btn-outline-secondary">연결 테스트</button>
        </div>
    </div>
</div>

<!-- 데이터 관리 -->
<div class="card">
    <div class="card-body">
        <h5 class="mb-4">🗄️ 데이터 관리</h5>
        <div class="alert alert-warning">
            <strong>⚠️ 주의:</strong> 아래 작업은 되돌릴 수 없습니다. 신중하게 진행하세요.
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary">DB 백업</button>
            <button class="btn btn-outline-info">로그 아카이브</button>
            <button class="btn btn-outline-danger">전체 로그 삭제</button>
        </div>
    </div>
</div>

{% endblock %}
